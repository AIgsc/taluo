// 生成单选题
function generateSingleChoice(poolItem) {
  const card = getCardById(poolItem.cardId);
  if (!card || !card.uk || !card.rk) return null;
  
  const isUp = poolItem.orientation === 'upright';
  const correctAnswer = isUp ? card.uk : card.rk;
  const question = `"${card.name}"${isUp ? '正' : '逆'}位核心含义是？`;
  
  // 从其他卡牌中抽3个同状态的干扰项
  const others = TAROT_CARDS.filter(c => c && c.id !== card.id && (isUp ? c.uk : c.rk));
  let distractors = [];
  
  if (others.length > 0) {
    const shuffled = shuffle([...others]);
    for (let i = 0; i < Math.min(3, shuffled.length); i++) {
      const text = isUp ? shuffled[i].uk : shuffled[i].rk;
      if (text && text !== correctAnswer && !distractors.includes(text)) {
        distractors.push(text);
      }
    }
  }
  
  // 如果干扰项不够，添加一些通用干扰词
  const fallbackDistractors = ['未知含义', '需进一步确认', '待补充'];
  while (distractors.length < 3) {
    const fallback = fallbackDistractors[distractors.length % fallbackDistractors.length];
    distractors.push(fallback);
  }
  
  const options = shuffle([correctAnswer, ...distractors]);
  const correctIndex = options.indexOf(correctAnswer);
  
  return {
    type: 'single',
    question,
    cardName: card.name,
    cardId: card.id,
    orientation: poolItem.orientation,
    options,
    correctIndex,
    correctAnswer,
    explanation: `${card.name}${isUp ? '正' : '逆'}位代表：${isUp ? card.ud : card.rd}`
  };
}

// 生成判断题
function generateTrueFalse(poolItem) {
  const card = getCardById(poolItem.cardId);
  if (!card || !card.ud || !card.rd) return null;
  
  const isUp = poolItem.orientation === 'upright';
  const trueDesc = isUp ? card.ud : card.rd;
  
  // 50%用真实描述，50%用其他卡牌描述
  let statement, correctAnswer;
  if (Math.random() < 0.5) {
    statement = trueDesc;
    correctAnswer = true;
  } else {
    // 用其他卡牌的描述作为错误干扰（确保与正确答案不同）
    const others = TAROT_CARDS.filter(c => c.id !== card.id && (isUp ? c.ud : c.rd) && (isUp ? c.ud : c.rd) !== trueDesc);
    const other = others.length > 0 ? others[Math.floor(Math.random() * others.length)] : card;
    statement = isUp ? other.ud : other.rd;
    correctAnswer = false;
  }
  
  return {
    type: 'truefalse',
    question: `"${card.name}"${isUp ? '正' : '逆'}位代表：${statement}`,
    cardName: card.name,
    cardId: card.id,
    orientation: poolItem.orientation,
    options: ['对', '错'],
    correctIndex: correctAnswer ? 0 : 1,
    correctAnswer: correctAnswer ? '对' : '错',
    explanation: `${card.name}${isUp ? '正' : '逆'}位代表：${isUp ? card.ud : card.rd}`
  };
}

// 生成填空题
function generateFillBlank(poolItem) {
  const card = getCardById(poolItem.cardId);
  if (!card || !card.uk || !card.rk) return null;
  
  const isUp = poolItem.orientation === 'upright';
  const keyword = isUp ? card.uk : card.rk;
  const desc = isUp ? card.ud : card.rd;
  
  // 将关键词按分隔符拆分（支持逗号、顿号、分号、斜杠、竖线、空格）
  let keywords = keyword.split(/[，,、；;\|\/\\\s]+/).filter(k => k.trim());
  // 如果拆分后是空数组，就把整个keyword放进去
  if (keywords.length === 0) keywords = [keyword];
  
  return {
    type: 'fillblank',
    question: `"${card.name}"${isUp ? '正' : '逆'}位核心含义是？`,
    cardName: card.name,
    cardId: card.id,
    orientation: poolItem.orientation,
    correctAnswer: keyword,
    keywords, // 存储拆分后的关键词数组
    hint: `提示：${desc}`,
    explanation: `${card.name}${isUp ? '正' : '逆'}位代表：${desc}（关键词：${keyword}）`
  };
}

// 生成逆位逻辑题
function generateReversedLogic(poolItem) {
  const card = getCardById(poolItem.cardId);
  if (!card || !card.uk || !card.rk) return null;
  
  // 逆位逻辑题：用正位关键词做题干，逆位关键词做答案
  if (poolItem.orientation === 'upright') {
    // 逻辑题必须用逆位出题，如果抽到正位就跳过（实际pool里会保证）
    return null;
  }
  
  const uprightKW = card.uk;
  const correctAnswer = card.rk;
  
  const others = TAROT_CARDS.filter(c => c.id !== card.id && c.rk).map(c => c.rk);
  const distractors = shuffle([...others]).slice(0, 3);
  const options = shuffle([correctAnswer, ...distractors]);
  const correctIndex = options.indexOf(correctAnswer);
  
  return {
    type: 'reversed',
    question: `"${card.name}"正位是「${uprightKW}」，逆位最可能是？`,
    cardName: card.name,
    cardId: card.id,
    orientation: 'reversed',
    options,
    correctIndex,
    correctAnswer,
    explanation: `${card.name}逆位代表：${card.rd}`
  };
}

// 生成倒序记忆题（看牌义选牌名）
function generateReverseMemory(poolItem) {
  const card = getCardById(poolItem.cardId);
  if (!card || !card.uk || !card.rk) return null;
  
  const isUp = poolItem.orientation === 'upright';
  const desc = isUp ? `${card.uk}，${card.ud}` : `${card.rk}，${card.rd}`;
  
  const others = TAROT_CARDS.filter(c => c.id !== card.id);
  const distractors = shuffle([...others]).slice(0, 3).map(c => c.name);
  // 优先从相似牌对中选干扰项
  const confusePair = CONFUSE_PAIRS.find(p => p.includes(card.id));
  if (confusePair) {
    const confuseId = confusePair[0] === card.id ? confusePair[1] : confusePair[0];
    const confuseCard = getCardById(confuseId);
    if (confuseCard && !distractors.includes(confuseCard.name)) {
      distractors.pop();
      distractors.push(confuseCard.name);
    }
  }
  const options = shuffle([card.name, ...distractors]);
  const correctIndex = options.indexOf(card.name);
  
  return {
    type: 'reverse',
    question: `以下描述对应哪张牌的${isUp ? '正' : '逆'}位？`,
    cardName: card.name,
    cardId: card.id,
    orientation: poolItem.orientation,
    desc: `「${desc}」`,
    options,
    correctIndex,
    correctAnswer: card.name,
    explanation: `${card.name}${isUp ? '正' : '逆'}位代表：${desc}`
  };
}

// 生成图片联想题（看图片不看牌名，回忆牌义）
function generateImageAssociation(poolItem) {
  const card = getCardById(poolItem.cardId);
  if (!card || !card.uk || !card.rk) return null;
  
  const isUp = poolItem.orientation === 'upright';
  const correctAnswer = isUp ? card.uk : card.rk;
  
  const others = TAROT_CARDS.filter(c => c.id !== card.id && (isUp ? c.uk : c.rk)).map(c => ({
    text: isUp ? c.uk : c.rk
  }));
  const distractors = shuffle([...others]).slice(0, 3).map(d => d.text);
  const options = shuffle([correctAnswer, ...distractors]);
  const correctIndex = options.indexOf(correctAnswer);
  
  return {
    type: 'image',
    question: `只看图片，这张牌${isUp ? '正' : '逆'}位核心含义是？`,
    cardName: card.name,
    cardId: card.id,
    orientation: poolItem.orientation,
    showImageOnly: true,
    options,
    correctIndex,
    correctAnswer,
    explanation: `${card.name}${isUp ? '正' : '逆'}位代表：${isUp ? card.uk + '，' + card.ud : card.rk + '，' + card.rd}`
  };
}

// ======================== 考试流程 ========================
function startExam() {
  // 按钮防抖
  if (buttonLocks['startExam']) return;
  buttonLocks['startExam'] = true;
  
  try {
    // 断网时禁止开始考试
    if (!navigator.onLine) {
      toast('网络连接不可用，无法开始考试');
      buttonLocks['startExam'] = false;
      return;
    }
    
    // 检查牌义数据是否已加载
    if (!TAROT_CARDS || TAROT_CARDS.length < 78) {
      toast('数据加载中，请稍后再试');
      buttonLocks['startExam'] = false;
      return;
    }
    
    // 固定参数：100题、全部78张牌、正位+逆位、薄弱优先
    const count = 100;
    const timeLimit = selectedTimeLimit;
    const pool = buildQuestionPool('all', 'both', 'weak');
    const selectedItems = weightedRandomSelect(pool, 'weak', count);
    // 首页显示题型比例（实际出题由动态配比算法按卡牌进度实时决定）
    allocateQuestionTypes(count);
    
    // 按题型配比生成题
    const questions = [];
    let remaining = [...selectedItems];
    
    // 1. 先挑出适合做对比题的牌对（属于CONFUSE_PAIRS的卡牌）
    const compareCandidates = remaining.filter(item => 
      CONFUSE_PAIRS.some(p => p.includes(item.cardId))
    );
    // 按混淆错误率排序（优先高频错误牌对）
    const confuseErrors = getConfuseErrors();
    const sortedCompare = shuffle(compareCandidates).sort((a, b) => {
      const pairA = CONFUSE_PAIRS.find(p => p.includes(a.cardId));
      const pairB = CONFUSE_PAIRS.find(p => p.includes(b.cardId));
      const errA = pairA ? (confuseErrors[pairA.sort((x,y)=>x-y).join('_')] || 0) : 0;
      const errB = pairB ? (confuseErrors[pairB.sort((x,y)=>x-y).join('_')] || 0) : 0;
      return errB - errA; // 错误多的优先
    });
    const compareUsed = new Set();
    const compareItems = sortedCompare.slice(0, 10);
    compareItems.forEach(item => {
      compareUsed.add(`${item.cardId}_${item.orientation}`);
      const q = generateCompareQuestion(item);
      if (q) questions.push(q);
    });
    remaining = remaining.filter(item => !compareUsed.has(`${item.cardId}_${item.orientation}`));
    
    // 2. 再挑10张做推导题（大阿卡纳4张 + 小阿卡纳6张）
    const deductionCandidates = remaining.filter(item => 
      DEDUCTION_DATA.cardDeductions[item.cardId]
    );
    // 分离大阿卡纳和小阿卡纳
    const majorDeduction = deductionCandidates.filter(i => i.cardId <= 22);
    const minorDeduction = deductionCandidates.filter(i => i.cardId >= 23);
    const deductionUsed = new Set();
    
    // 优先选大阿卡纳（4张）
    const majorItems = shuffle(majorDeduction).slice(0, 4);
    majorItems.forEach(item => {
      deductionUsed.add(`${item.cardId}_${item.orientation}`);
      const q = generateDeductionQuestion(item);
      if (q) questions.push(q);
    });
    
    // 再选小阿卡纳（6张）
    const minorItems = shuffle(minorDeduction).slice(0, 6);
    minorItems.forEach(item => {
      deductionUsed.add(`${item.cardId}_${item.orientation}`);
      const q = generateDeductionQuestion(item);
      if (q) questions.push(q);
    });
    
    remaining = remaining.filter(item => !deductionUsed.has(`${item.cardId}_${item.orientation}`));
    
    // 3. 再挑10张做画面锚点题（需要有锚点数据的卡牌）
    const anchorCandidates = remaining.filter(item => {
      const list = getCardAnchors(item.cardId, item.orientation);
      return list && list.length > 0;
    });
    const anchorUsed = new Set();
    const anchorItems = shuffle(anchorCandidates).slice(0, 10);
    anchorItems.forEach(item => {
      anchorUsed.add(`${item.cardId}_${item.orientation}`);
      const q = generateImageAnchorQuestion(item);
      if (q) questions.push(q);
    });
    remaining = remaining.filter(item => !anchorUsed.has(`${item.cardId}_${item.orientation}`));
    
    // 4. 逆位逻辑题（约5题，只从剩余的逆位项中生成）
    const revCandidates = remaining.filter(i => i.orientation === 'reversed');
    const revCount = Math.min(Math.max(3, Math.floor(count * 0.05)), revCandidates.length);
    const revUsed = new Set();
    shuffle(revCandidates).slice(0, revCount).forEach(item => {
      revUsed.add(`${item.cardId}_${item.orientation}`);
      const q = generateReversedLogic(item);
      if (q) questions.push(q);
    });
    remaining = remaining.filter(item => !revUsed.has(`${item.cardId}_${item.orientation}`));
  
  // 5. 剩余题目按动态题型配比生成（每张牌根据进度决定题型）
  remaining.forEach((item, index) => {
    if (questions.length >= count) return;
    // 每5题插入一个倒序记忆或图片联想
    let type;
    if (index % 5 === 2) {
      type = Math.random() < 0.5 ? 'reverse' : 'image';
    } else {
      type = getDynamicTypeForCard(item.cardId);
    }
    
    let q = null;
    if (type === 'single') q = generateSingleChoice(item);
    else if (type === 'truefalse') q = generateTrueFalse(item);
    else if (type === 'fillblank') q = generateFillBlank(item);
    else if (type === 'recall') q = generateRecallQuestion(item);
    else if (type === 'reverse') q = generateReverseMemory(item);
    else if (type === 'image') q = generateImageAssociation(item);
    
    if (q) questions.push(q);
  });
  
  // 6. 如果还不够，用推导题或单选题从 selectedItems 补，仍不足则从原始池子补
  const usedKeys = new Set(questions.map(q => `${q.cardId}_${q.orientation}`));
  for (const item of selectedItems) {
    if (questions.length >= count) break;
    if (usedKeys.has(`${item.cardId}_${item.orientation}`)) continue;
    // 优先尝试推导题
    let q = DEDUCTION_DATA.cardDeductions[item.cardId]
      ? generateDeductionQuestion(item)
      : null;
    if (!q) q = generateSingleChoice(item);
    if (q) { questions.push(q); usedKeys.add(`${item.cardId}_${item.orientation}`); }
  }
  // 如果 selectedItems 耗尽仍不足，从原始池子中补全
  if (questions.length < count) {
    const extraCandidates = shuffle(pool.filter(p => !usedKeys.has(`${p.cardId}_${p.orientation}`)));
    for (const item of extraCandidates) {
      if (questions.length >= count) break;
      let q = DEDUCTION_DATA.cardDeductions[item.cardId]
        ? generateDeductionQuestion(item)
        : null;
      if (!q) q = generateSingleChoice(item);
      if (q) { questions.push(q); usedKeys.add(`${item.cardId}_${item.orientation}`); }
    }
  }
  
  // 打乱题目顺序，尽量避免连续同一张牌或连续同一题型
  let shuffled = shuffle(questions.filter(q => q));
  // 优化排列：如果发现连续同一张牌或同一题型，就和后面的题交换
  for (let i = 0; i < shuffled.length - 1; i++) {
    const current = shuffled[i];
    const next = shuffled[i + 1];
    if (
      current.cardId === next.cardId || 
      current.type === next.type
    ) {
      // 找后面一个不同的题交换
      for (let j = i + 2; j < shuffled.length; j++) {
        if (
          shuffled[j].cardId !== current.cardId && 
          shuffled[j].type !== current.type
        ) {
          [shuffled[i + 1], shuffled[j]] = [shuffled[j], shuffled[i + 1]];
          break;
        }
      }
    }
  }
  const finalQuestions = shuffled.slice(0, count);
  
  currentExam = {
    questions: finalQuestions,
    currentIndex: 0,
    timeLimit,
    startTime: Date.now(),
    questionStartTime: Date.now(),
    answers: [],
    totalCount: finalQuestions.length,
    examType: 'normal',
    pausedTime: 0,
    pauseStart: null,
    createdAt: Date.now()
  };

    // 立即全量保存考试状态到服务器（包含100道题，确保后续增量同步有完整数据）
    saveExamState();
    syncExamStateToServer();
    
    // 预加载前几张题的图片（浏览器后台下载，不阻塞）
    preloadInitialImages();
    
    showScreen('exam');
    renderQuestion();
    startExamTimer();
    
    // 500ms后解锁按钮
    setTimeout(() => {
      buttonLocks['startExam'] = false;
    }, 500);
  } catch (e) {
    console.error('开始考试出错:', e);
    toast('开始考试失败，请刷新页面重试');
    // 错误时立即解锁按钮
    buttonLocks['startExam'] = false;
  }
}

function pauseExamFromVisibility() {
  if (!currentExam) return;
  // 如果已经在暂停，就不重复处理
  if (currentExam.pauseStart) return;
  
  // 记录暂停开始时间
  currentExam.pauseStart = Date.now();
  
  // 如果答题计时器正在运行，计算并保存剩余时间
  if (questionTimer && currentExam.questionStartTime) {
    const elapsed = Math.floor((Date.now() - currentExam.questionStartTime) / 1000);
    currentExam.questionRemaining = Math.max(0, currentExam.timeLimit - elapsed);
    currentExam.pausePhase = 'answering'; // 标记暂停阶段：答题中
  } else if (pendingImageTimerId || pendingImageCdInterval) {
    // 如果处于图片观察阶段，记录这个阶段
    currentExam.pausePhase = 'observing'; // 标记暂停阶段：图片观察中
    // 同时也保存完整答题时间
    currentExam.questionRemaining = currentExam.timeLimit;
  } else {
    // 其他阶段
    currentExam.questionRemaining = currentExam.timeLimit;
    currentExam.pausePhase = 'idle';
  }
  
  // 清理所有定时器
  clearAllTimers();
  
  // 只保存本地（每答1题已增量同步到服务器，无需再全量同步）
  saveExamState();
}

async function resumeExamFromVisibility() {
  if (!currentExam) return;
  if (!currentExam.pauseStart) return;
  
  // 检查服务器是否有更多答题记录（其他设备可能答了更多题）
  try {
    const result = await fetchExamStateFromServer();
    if (result.state && result.state.answers) {
      const serverCount = result.state.answers.length;
      const localCount = (currentExam.answers || []).length;
      if (serverCount > localCount) {
        // 服务器进度更新，重新加载
        currentExam = null;
        resumeExam();
        return;
      }
    }
  } catch (e) {}
  
  // 计算暂停时间
  currentExam.pausedTime = (currentExam.pausedTime || 0) + (Date.now() - currentExam.pauseStart);
  currentExam.pauseStart = null;
  
  saveExamState();
  renderQuestion();
  startExamTimer();
}

function startExamTimer() {
  if (examTimer) clearInterval(examTimer);
  // 如果之前有暂停时间，恢复时清除暂停开始标记
  if (currentExam && currentExam.pauseStart) {
    currentExam.pauseStart = null;
  }
  examTimer = setInterval(() => {
    if (!currentExam) return;
    const totalElapsed = Math.floor((Date.now() - currentExam.startTime) / 1000);
    const pausedSeconds = Math.floor((currentExam.pausedTime || 0) / 1000);
    const actualElapsed = totalElapsed - pausedSeconds;
    document.getElementById('exam-info').textContent = `已用时 ${actualElapsed}s`;
  }, 1000);
}

// 预加载指定卡牌图片的辅助函数
function preloadCardImage(cardId) {
  if (!cardId || !cardImages[cardId]) return;
  const img = new Image();
  img.src = cardImages[cardId];
}

// 开始答题时预加载前几张题的图片
function preloadInitialImages() {
  if (!currentExam || !currentExam.questions) return;
  const preloadCount = Math.min(3, currentExam.questions.length);
  for (let i = 0; i < preloadCount; i++) {
    const q = currentExam.questions[i];
    if (q && q.cardId) preloadCardImage(q.cardId);
  }
}

function renderQuestion() {
  if (!currentExam || !currentExam.questions || currentExam.currentIndex >= currentExam.totalCount) {
    finishExam();
    return;
  }
  
  // 先清理所有定时器，防止多个计时器同时运行！
  clearAllTimers();
  
  let q = currentExam.questions[currentExam.currentIndex];
  // 如果当前题无效，就跳过到下一题
  while (!q && currentExam.currentIndex < currentExam.totalCount - 1) {
    currentExam.currentIndex++;
    q = currentExam.questions[currentExam.currentIndex];
  }
  if (!q) {
    finishExam();
    return;
  }
  
  // 预加载下一题的图片（如果有的话）
  if (currentExam.currentIndex + 1 < currentExam.totalCount) {
    const nextQ = currentExam.questions[currentExam.currentIndex + 1];
    if (nextQ && nextQ.cardId) preloadCardImage(nextQ.cardId);
  }
  
  const idx = currentExam.currentIndex + 1;
  const total = currentExam.totalCount;
  
  document.getElementById('exam-title').textContent = `第 ${idx}/${total} 题`;
  const typeNames = {
    single: '单选题', truefalse: '判断题', fillblank: '填空题', 
    reversed: '逆位逻辑题', reverse: '倒序记忆', image: '图片联想',
    compare: '相似牌对比', recall: '看牌说词', image_anchor: '画面锚点',
    deduction: '推导题'
  };
  document.getElementById('quiz-type-label').textContent = typeNames[q.type] || '未知题型';
  
  // 启动总用时时器
  startExamTimer();
  
  // 渲染题干
  const tagClass = q.orientation === 'upright' ? 'upright' : 'reversed';
  const tagText = q.orientation === 'upright' ? '正位' : '逆位';
  
  // 逆位图片旋转180度
  const imgRotation = q.orientation === 'reversed' ? 'transform:rotate(180deg);transform-origin:center' : '';
  
  // 先显示图片（放大到60%屏幕宽度），等图片加载完成后开始5秒倒计时
  if (pendingImageTimerId) { clearTimeout(pendingImageTimerId); pendingImageTimerId = null; }
  if (pendingImageCdInterval) { clearTimeout(pendingImageCdInterval); pendingImageCdInterval = null; }
  
  const imgSize = 'width:60vw;max-width:300px';
  const imgSizeSmall = 'width:60vw;max-width:120px';
  
  if (q.type === 'reverse') {
    // 倒序记忆：只显示文字描述，不显示牌名和图片（纯回忆训练）
    document.getElementById('quiz-question-area').innerHTML = `
      <div class="q-text" style="font-size:16px;color:#d4b87a;font-weight:600;text-align:center;padding:10px 0">${q.desc}</div>
      <div class="q-text">${q.question}</div>
    `;
    document.getElementById('quiz-options-area').innerHTML = q.options.map((opt, i) => `
      <button class="quiz-option" data-index="${i}" onclick="answerQuestion(${i})">${opt}</button>
    `).join('');
    document.getElementById('quiz-feedback-area').innerHTML = '';
    startQuestionTimer();
  } else {
    // 先显示图片 + "加载中..."提示
    document.getElementById('quiz-question-area').innerHTML = `
      <img class="quiz-card-img pending" id="current-card-img" src="${cardImages[q.cardId]}" alt="" loading="eager" onerror="this.style.display='none'" style="${imgSize};${imgRotation}">
      <div style="text-align:center;color:#d4b87a;font-size:14px;margin:8px 0" id="img-status">⏳ 图片加载中...</div>
    `;
    document.getElementById('quiz-options-area').innerHTML = '';
    document.getElementById('quiz-feedback-area').innerHTML = '';
    
    // 等待图片加载完成后开始5秒观察倒计时
    const imgEl = document.getElementById('current-card-img');
    
    const startImageCountdown = () => {
      const statusEl = document.getElementById('img-status');
      if (statusEl) statusEl.innerHTML = '🔍 仔细观察画面 <span id="image-countdown">5</span>s';
      
      // 基于时间戳计算剩余秒数，链式 setTimeout 防止 interval 堆叠
      const expireTime = Date.now() + 5000;
      const tick = () => {
        const remaining = Math.max(0, Math.ceil((expireTime - Date.now()) / 1000));
        const cdEl = document.getElementById('image-countdown');
        if (cdEl) cdEl.textContent = remaining;
        if (remaining > 0) {
          pendingImageCdInterval = setTimeout(tick, 200); // 200ms 检查一次，保证显示及时更新
        } else {
          pendingImageCdInterval = null;
        }
      };
      pendingImageCdInterval = setTimeout(tick, 200);
      
      pendingImageTimerId = setTimeout(() => {
        pendingImageTimerId = null;
        if (pendingImageCdInterval) { clearTimeout(pendingImageCdInterval); pendingImageCdInterval = null; }
        
        // 现在显示完整题目
        let qHtml = '';
        const isImageOnly = (q.type === 'image' || q.type === 'recall' || q.type === 'image_anchor' || q.type === 'deduction');
        if (isImageOnly) {
          qHtml = `
            <img class="quiz-card-img large" src="${cardImages[q.cardId]}" alt="" loading="lazy" onerror="this.style.display='none'" style="${imgSizeSmall};${imgRotation}">
            <div class="q-text">${q.question}</div>
          `;
        } else {
          qHtml = `
            <img class="quiz-card-img large" src="${cardImages[q.cardId]}" alt="${q.cardName}" loading="lazy" onerror="this.style.display='none'" style="${imgSizeSmall};${imgRotation}">
            <div class="card-name">${q.cardName}</div>
            <span class="orientation-tag ${tagClass}">${tagText}</span>
            <div class="q-text">${q.question}</div>
          `;
        }
        document.getElementById('quiz-question-area').innerHTML = qHtml;
        
        if (q.type === 'fillblank' || q.type === 'recall') {
          document.getElementById('quiz-options-area').innerHTML = `
            ${q.hint ? `<div style="color:#8a7a60;font-size:13px;margin-bottom:8px">${q.hint}</div>` : ''}
            <div class="quiz-input-wrap">
              <input type="text" id="fill-answer" placeholder="${q.type === 'recall' ? '输入关键词，用逗号分隔...' : '输入关键词...'}" onkeydown="if(event.key==='Enter' && !buttonLocks['submitFillAnswer'])submitFillAnswer()">
              <button class="btn btn-primary btn-sm" onclick="submitFillAnswer()">确认</button>
            </div>
          `;
          const fillInput = document.getElementById('fill-answer');
          // 修复：iOS设备键盘遮挡确认按钮 - 输入框获得焦点时自动滚动
          fillInput.addEventListener('focus', () => {
            setTimeout(() => {
              if (window.innerHeight < 500) {
                window.scrollTo(0, document.body.scrollHeight);
              }
            }, 300);
          });
          fillInput.focus();
        } else {
          document.getElementById('quiz-options-area').innerHTML = q.options.map((opt, i) => `
            <button class="quiz-option" data-index="${i}" onclick="answerQuestion(${i})">${opt}</button>
          `).join('');
        }
        
        startQuestionTimer();
      }, 5000);
    };
    
    // 监听图片加载完成和错误
    let imageLoaded = false;
    const onImageReady = () => {
      if (imageLoaded) return;
      imageLoaded = true;
      startImageCountdown();
    };
    
    imgEl.onload = onImageReady;
    imgEl.onerror = onImageReady;
    
    // 超时 fallback，最多等 3 秒（句柄保存到全局，切题时可清理）
    pendingImageFallbackId = setTimeout(() => {
      pendingImageFallbackId = null;
      onImageReady();
    }, 3000);
    
    // 检查图片是否已经加载完成
    if (imgEl.complete) onImageReady();
  }
}

function startQuestionTimer() {
  if (questionTimer) clearInterval(questionTimer);
  
  // 真正开始答题时才记录开始时间（排除图片观察时间）
  currentExam.questionStartTime = Date.now();
  
  const timerEl = document.getElementById('quiz-timer');
  
  // 如果有暂停时的剩余时间，就用那个；否则用完整时间
  let remaining;
  if (currentExam.questionRemaining !== undefined && currentExam.questionRemaining !== null) {
    remaining = currentExam.questionRemaining;
    // 使用完后清除剩余时间标记
    currentExam.questionRemaining = null;
  } else {
    remaining = currentExam.timeLimit;
  }
  
  timerEl.textContent = remaining + 's';
  timerEl.classList.remove('warning');
  
  questionTimer = setInterval(() => {
    remaining--;
    timerEl.textContent = remaining + 's';
    if (remaining <= 5) timerEl.classList.add('warning');
    if (remaining <= 0) {
      clearInterval(questionTimer);
      onTimeout();
    }
  }, 1000);
}

function onTimeout() {
  // 先清理所有定时器
  clearAllTimers();
  
  if (!currentExam || !currentExam.questions) return;
  const q = currentExam.questions[currentExam.currentIndex];
  const answerTime = Date.now() - currentExam.questionStartTime;
  currentExam.answers.push({ cardId: q.cardId, orientation: q.orientation, correct: false, timeout: true, answerTime });
  updateProgress(q.cardId, q.orientation, false, answerTime);
  recordError(q.cardId, q.orientation, false, undefined, true);
  
  // 超时也要同步（本地 + 增量服务器）
  saveExamState();
  syncExamAnswerToServer(
    { cardId: q.cardId, orientation: q.orientation, correct: false, timeout: true, answerTime },
    currentExam.currentIndex
  );
  
  // 禁用所有选项按钮，防止超时后继续答题
  const options = document.querySelectorAll('.quiz-option');
  options.forEach(opt => opt.classList.add('disabled'));
  
  showFeedback(false, '时间到！', q.explanation);
  
  // 500ms后解锁按钮
  setTimeout(() => {
    buttonLocks['answerQuestion'] = false;
  }, 500);
}

function answerQuestion(optionIndex) {
  // 按钮防抖
  if (buttonLocks['answerQuestion']) return;
  buttonLocks['answerQuestion'] = true;
  
  if (!currentExam || !currentExam.questions) {
    buttonLocks['answerQuestion'] = false;
    return;
  }
  
  // 清理所有定时器
  clearAllTimers();
  
  const q = currentExam.questions[currentExam.currentIndex];
  const isCorrect = optionIndex === q.correctIndex;
  const answerTime = Date.now() - currentExam.questionStartTime;
  
  currentExam.answers.push({ cardId: q.cardId, orientation: q.orientation, correct: isCorrect, timeout: false, answerTime });
  updateProgress(q.cardId, q.orientation, isCorrect, answerTime);
  recordError(q.cardId, q.orientation, isCorrect);
  // 追踪对比题的错误
  if (q.type === 'compare' && !isCorrect) recordConfusePairError(q.cardId, q.orientation);
  
  // 高亮选项
  const options = document.querySelectorAll('.quiz-option');
  options.forEach((opt, i) => {
    opt.classList.add('disabled');
    if (i === q.correctIndex) opt.classList.add('correct');
    if (i === optionIndex && !isCorrect) opt.classList.add('wrong');
  });
  
  showFeedback(isCorrect, isCorrect ? '回答正确！' : '回答错误', q.explanation);
  
  // 答完题 → 保存本地（快速兜底）+ 增量同步到服务器（轻量，只传一道题）
  saveExamState();
  syncExamAnswerToServer(
    { cardId: q.cardId, orientation: q.orientation, correct: isCorrect, timeout: false, answerTime },
    currentExam.currentIndex
  );
  
  // 500ms后解锁按钮（给反馈展示留出时间）
  setTimeout(() => {
    buttonLocks['answerQuestion'] = false;
  }, 500);
}

// 标准化字符串：全角转半角、转小写、去空格
function normalizeString(str) {
  if (!str) return '';
  return str
    .toLowerCase()
    .replace(/[Ａ-Ｚａ-ｚ０-９]/g, (s) => String.fromCharCode(s.charCodeAt(0) - 0xFEE0)) // 全角转半角
    .replace(/\s+/g, '') // 去所有空格
    .trim();
}

// 模糊匹配两个字符串
function fuzzyMatch(str1, str2) {
  const a = normalizeString(str1);
  const b = normalizeString(str2);
  if (!a || !b) return false;
  return a.includes(b) || b.includes(a);
}

function submitFillAnswer() {
  // 按钮防抖
  if (buttonLocks['submitFillAnswer']) return;
  buttonLocks['submitFillAnswer'] = true;
  
  // 修复：iOS设备键盘遮挡确认按钮
  if (window.innerHeight < 500) {
    window.scrollTo(0, document.body.scrollHeight);
  }
  
  if (!currentExam || !currentExam.questions) {
    buttonLocks['submitFillAnswer'] = false;
    return;
  }
  
  // 清理所有定时器
  clearAllTimers();
  
  const input = document.getElementById('fill-answer');
  const userAnswer = input.value.trim();
  const q = currentExam.questions[currentExam.currentIndex];
  
  let isCorrect = false;
  
  if (q.type === 'recall') {
    // 纯回忆题判分：匹配度≥80%算对
    const correctKeywords = q.keywords || [q.correctAnswer];
    // 拆分用户输入的关键词
    const userKeywords = userAnswer.split(/[，,、；;\|\/\\\s]+/).filter(k => k.trim());
    
    // 如果用户输入为空，直接算错
    if (userKeywords.length === 0) {
      isCorrect = false;
    } else {
      let matchCount = 0;
      
      correctKeywords.forEach(kw => {
        if (userKeywords.some(uk => fuzzyMatch(uk, kw))) {
          matchCount++;
        }
      });
      
      // 匹配度≥80%算对
      isCorrect = (matchCount / correctKeywords.length) >= 0.8;
    }
  } else {
    // 填空题判分：包含任意一个关键词就算对
    const keywords = q.keywords || [q.correctAnswer];
    
    // 如果用户输入为空，直接算错
    if (userAnswer) {
      for (const kw of keywords) {
        if (kw && fuzzyMatch(userAnswer, kw)) {
          isCorrect = true;
          break;
        }
      }
    }
  }
  
  const answerTime = Date.now() - currentExam.questionStartTime;
  
  currentExam.answers.push({ cardId: q.cardId, orientation: q.orientation, correct: isCorrect, timeout: false, answerTime });
  updateProgress(q.cardId, q.orientation, isCorrect, answerTime);
  recordError(q.cardId, q.orientation, isCorrect);
  if (q.type === 'compare' && !isCorrect) recordConfusePairError(q.cardId, q.orientation);
  
  document.getElementById('quiz-options-area').innerHTML = '';
  showFeedback(isCorrect,
    isCorrect ? '回答正确！' : `回答错误，正确答案是：${q.correctAnswer}`,
    q.explanation
  );
  
  // 答完题 → 保存本地（快速兜底）+ 增量同步到服务器（轻量，只传一道题）
  saveExamState();
  syncExamAnswerToServer(
    { cardId: q.cardId, orientation: q.orientation, correct: isCorrect, timeout: false, answerTime },
    currentExam.currentIndex
  );
  
  // 500ms后解锁按钮
  setTimeout(() => {
    buttonLocks['submitFillAnswer'] = false;
  }, 500);
}

function showFeedback(isCorrect, msg, explanation) {
  const q = currentExam ? currentExam.questions[currentExam.currentIndex] : null;
  const idx = currentExam ? currentExam.currentIndex : 0;
  
  // 构建多行排版反馈
  let bodyHtml = '';
  if (q) {
    // 推导题：使用专门的反馈格式
    if (q.type === 'deduction') {
      const isUp = q.orientation === 'upright';
      const orientText = isUp ? '正位' : '逆位';
      const orientClass = isUp ? 'up' : 'rev';
      
      // 第1行：卡牌名称 + 正/逆位标签
      bodyHtml += `<div class="fb-identity">${q.cardName}<span class="fb-orient ${orientClass}">${orientText}</span></div>`;
      // 直接使用推导题的完整 explanation（已经是 HTML 格式）
      bodyHtml += explanation;
    } else {
      // 其他题型：保持原有的反馈格式
      const isUp = q.orientation === 'upright';
      const orientText = isUp ? '正位' : '逆位';
      const orientClass = isUp ? 'up' : 'rev';
      
      // 第1行：卡牌名称 + 正/逆位标签
      bodyHtml += `<div class="fb-identity">${q.cardName}<span class="fb-orient ${orientClass}">${orientText}</span></div>`;
      // 核心牌义标签（始终取 card.uk/card.rk，不受题型 correctAnswer 影响）
      const fbCard = getCardById(q.cardId);
      if (fbCard) {
        const coreMeaning = isUp ? fbCard.uk : fbCard.rk;
        const kwList = coreMeaning.split(/[，,、；;]/).filter(k => k.trim());
        bodyHtml += `<div class="fb-answer">${kwList.map(k => `<span class="fb-tag">${k.trim()}</span>`).join('')}</div>`;
      }
      
      // 第2行：画面锚点标签
      const anchorList = getCardAnchors(q.cardId, q.orientation) || [];
      let anchorWords;
      if (q.type === 'image_anchor' && q.selectedAnchors) {
        anchorWords = q.selectedAnchors;
      } else {
        anchorWords = shuffle([...anchorList]).slice(0, Math.min(3, anchorList.length));
      }
      bodyHtml += `<div class="fb-section"><div class="fb-section-label">画面锚点</div><div class="fb-tags">${anchorWords.map(w => `<span class="fb-tag">${w}</span>`).join('')}</div></div>`;
      
      // 第3行：完整解析
      let cleanExplanation = explanation;
      if (q.type === 'image_anchor') {
        // 画面锚点题：保持原有explanation（包含画面锚点→核心含义的训练信息），不替换
      } else {
        const patterns = [
          `${q.cardName}${orientText}核心关键词`,
          `${q.cardName}${orientText}代表`
        ];
        for (const p of patterns) {
          if (cleanExplanation.startsWith(p)) {
            cleanExplanation = cleanExplanation.substring(p.length).replace(/^[：:]/, '').trim();
            break;
          }
        }
      }
      bodyHtml += `<div class="fb-section"><div class="fb-section-label">完整解析</div><div class="fb-detail">${cleanExplanation}</div></div>`;
    }
  }
  
  // 闭眼回忆引导：每完成5道题后插入
  const isMilestone = (idx + 1) > 0 && (idx + 1) % 5 === 0;
  
  const feedbackHtml = `
    <div class="quiz-feedback ${isCorrect ? 'correct' : 'wrong'}">
      <div class="fb-status ${isCorrect ? 'correct' : 'wrong'}">${isCorrect ? '✅' : '❌'} ${msg}</div>
      <div class="fb-body">${bodyHtml}</div>
    </div>
    ${isMilestone ? `
      <div style="text-align:center;padding:16px;color:#8a7a60;font-size:13px" id="recall-reminder">
        💡 闭上眼睛，回忆一下刚才5张牌的画面和核心关键词，然后继续
      </div>
    ` : ''}
    <button class="btn btn-primary quiz-next-btn" id="next-btn" onclick="nextQuestion()">下一题</button>
  `;
  
  document.getElementById('quiz-feedback-area').innerHTML = feedbackHtml;
  
  // 预加载下一题的卡牌图片（安全检查）
  if (currentExam && 
      currentExam.currentIndex + 1 < currentExam.totalCount &&
      currentExam.questions && 
      currentExam.questions[currentExam.currentIndex + 1]) {
    const nextQ = currentExam.questions[currentExam.currentIndex + 1];
    if (nextQ && nextQ.cardId !== undefined && cardImages[nextQ.cardId]) {
      const img = new Image();
      img.src = cardImages[nextQ.cardId];
    }
  }
  
  // 自动滚动到反馈区域，方便点击下一题
  setTimeout(() => {
    const fbArea = document.getElementById('quiz-feedback-area');
    if (fbArea) fbArea.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  }, 50);
}

function nextQuestion() {
  // 按钮防抖
  if (buttonLocks['nextQuestion']) return;
  buttonLocks['nextQuestion'] = true;
  
  if (!currentExam) {
    buttonLocks['nextQuestion'] = false;
    return;
  }
  
  currentExam.currentIndex++;
  // 保存考试状态
  saveExamState();
  
  if (currentExam.currentIndex >= currentExam.totalCount) {
    finishExam();
  } else {
    renderQuestion();
  }
  
  // 500ms后解锁按钮
  setTimeout(() => {
    buttonLocks['nextQuestion'] = false;
  }, 500);
}

async function finishExam() {
  clearAllTimers(); // 清理所有定时器
  
  if (!currentExam) return;

  // 交卷前立即同步考试状态（确保服务器有完整答案）
  saveExamState();
  await syncExamStateToServer();
  
  const validAnswers = (currentExam.answers || []).filter(a => a != null);
  const correctCount = validAnswers.filter(a => a.correct).length;
  const total = currentExam.totalCount;
  const rate = total > 0 ? Math.round(correctCount / total * 100) : 0;
  // 计算总用时扣除暂停时间
  const totalDuration = Math.floor((Date.now() - currentExam.startTime) / 1000);
  const pausedSeconds = Math.floor((currentExam.pausedTime || 0) / 1000);
  const duration = totalDuration - pausedSeconds;
  
  // 保存考试记录（错题强化不保存）
  if (!currentExam.isReview) {
    const errorIds = validAnswers.filter(a => !a.correct).map(a => `${a.cardId}_${a.orientation}`);
    const exams = getExams();
    exams.push({ time: new Date().toISOString(), total, score: correctCount, rate, duration, errorIds });
    saveExams(exams);
    syncExamToServer(total, correctCount, rate, duration, errorIds);
  }
  
  // 渲染结果
  document.getElementById('result-score').textContent = rate + '%';
  document.getElementById('result-total').textContent = total;
  document.getElementById('result-correct').textContent = correctCount;
  document.getElementById('result-duration').textContent = duration + 's';
  
  // 错题列表
  const errorList = document.getElementById('error-review-list');
  const errors = currentExam.questions.filter((q, i) => !currentExam.answers[i]?.correct);
  if (errors.length === 0) {
    errorList.innerHTML = '<div style="text-align:center;padding:20px;color:#8a7a60">全部答对！太厉害了！</div>';
  } else {
    errorList.innerHTML = errors.map((q, i) => {
      const ai = currentExam.questions.indexOf(q);
      const ans = currentExam.answers[ai];
      const sm2 = getSM2Data(q.cardId, q.orientation);
      const dueStr = sm2.dueDate ? new Date(sm2.dueDate).toLocaleDateString('zh-CN', { month:'short', day:'numeric' }) : '';
      return `
        <div class="error-item">
          <div>
            <span class="err-card">${q.cardName} ${q.orientation === 'upright' ? '正' : '逆'}位</span>
            ${ans?.timeout ? '<span style="color:#e08080;font-size:11px">（超时）</span>' : ''}
            <div style="font-size:11px;color:#8a7a60;margin-top:2px">
              ${sm2.interval > 0 ? `间隔${sm2.interval}天·难度${sm2.easeFactor.toFixed(1)}·${dueStr}` : ''}
            </div>
          </div>
          <span class="err-answer">${q.explanation}</span>
        </div>
      `;
    }).join('');
  }
  
  // 清除考试状态
  clearExamState();
  currentExam = null;
  showScreen('result');
}

// ======================== 错题强化 ========================
// 首页总掌握率更新（与 updateHomeMastery 联动）
function updateHomeMastery() {
  const homeMastery = document.getElementById('home-mastery-info');
  if (!homeMastery || !TAROT_CARDS || TAROT_CARDS.length === 0) return;
  const progress = getProgress();
  let total = 0, mastered = 0;
  TAROT_CARDS.forEach(card => {
    ['upright', 'reversed'].forEach(ori => {
      total++;
      const key = buildProgressKey(card.id, ori);
      const prog = (progress[key]?.progress) || 0;
      if (prog >= 100) mastered++;
    });
  });
  homeMastery.textContent = total > 0 ? `已掌握 ${mastered}/${total} (${Math.round(mastered/total*100)}%)` : '';
}

function renderReviewList() {
  const errors = getErrors();
  const progress = getProgress();
  const listArea = document.getElementById('review-list-area');
  const startBtn = document.getElementById('review-start-btn');
  const countInfo = document.getElementById('review-count-info');
  
  // 如果元素不存在（不在错题页），提前返回
  if (!listArea) return;
  
  let entries = [];
  for (const key in errors) {
    const [cardIdStr, orientation] = key.split('_');
    const cardId = parseInt(cardIdStr);
    const card = getCardById(cardId);
    if (!card) continue;
    
    const err = errors[key];
    const rawProg = progress[key];
    const prog = rawProg?.progress || 0;
    
    // 连续答对5次的不显示
    if (err.cc >= 5) continue;
    
    let include = true;
    if (reviewFilter === 'weak' && prog > 30) include = false;
    
    if (include) {
      entries.push({ cardId, orientation, card, err, prog, key });
    }
  }
  
  if (countInfo) {
    countInfo.textContent = entries.length > 0 ? `共 ${entries.length} 个薄弱项` : '';
  }
  
  if (entries.length === 0) {
    listArea.innerHTML = `
      <div class="review-empty">
        <div class="icon">🎉</div>
        <p>暂无薄弱项，继续保持！</p>
      </div>`;
    if (startBtn) startBtn.style.display = 'none';
  } else {
    listArea.innerHTML = entries.sort((a, b) => b.err.ec - a.err.ec).map(e => `
      <div class="error-item" style="flex-direction:column;align-items:stretch">
        <div style="display:flex;justify-content:space-between">
          <span><span class="err-card">${e.card.name}</span> ${e.orientation === 'upright' ? '正位' : '逆位'}</span>
          <span style="color:#8a7a60;font-size:12px">错${e.err.ec}次 | 进度${e.prog}%${e.err.timeout ? ' | ⏱️超时' : ''}</span>
        </div>
      </div>
    `).join('');
    if (startBtn) startBtn.style.display = 'block';
  }
}

function startReview(fromResult) {
  // 按钮防抖
  if (buttonLocks['startReview']) return;
  buttonLocks['startReview'] = true;
  
  const errors = getErrors();
  const progress = getProgress();
  
  let pool = [];
  for (const key in errors) {
    const [cardIdStr, orientation] = key.split('_');
    const cardId = parseInt(cardIdStr);
    const card = getCardById(cardId);
    if (!card) continue;
    
    const err = errors[key];
    if (err.cc >= 5) continue;
    
    let include = true;
    if (!fromResult && reviewFilter === 'weak') {
      const rawProg = progress[key];
      const progVal = rawProg?.progress || 0;
      if (progVal > 30) include = false;
    }
    
    if (include) {
      pool.push({ cardId, orientation, card, err, key });
    }
  }
  
  if (pool.length === 0) {
    toast('没有需要强化的错题');
    buttonLocks['startReview'] = false;
    return;
  }
  
  // 按错误次数排序，优先推高频错题
  pool.sort((a, b) => b.err.ec - a.err.ec);
  
  // 生成题目（小阿卡纳卡牌优先用推导题）
  const questions = pool.map(p => {
    const isUp = p.orientation === 'upright';
    const correctAnswer = isUp ? p.card.uk : p.card.rk;
    
    // 如果有推导题数据，优先尝试生成推导题（支持大阿卡纳和小阿卡纳）
    if (DEDUCTION_DATA.cardDeductions[p.cardId]) {
      const deductionQ = generateDeductionQuestion({ cardId: p.cardId, orientation: p.orientation });
      if (deductionQ) {
        return deductionQ;
      }
    }
    
    // 如果不能生成推导题，用动态题型
    const type = getDynamicTypeForCard(p.cardId);
    if (type === 'truefalse') {
      const trueDesc = isUp ? p.card.ud : p.card.rd;
      const fakeOthers = TAROT_CARDS.filter(c => c.id !== p.cardId && (isUp ? c.ud : c.rd));
      const statement = Math.random() < 0.5 ? trueDesc : (fakeOthers[Math.floor(Math.random()*fakeOthers.length)] || {})[isUp?'ud':'rd'] || trueDesc;
      const correctAnswerBool = statement === trueDesc;
      return {
        type: 'truefalse', question: `"${p.card.name}"${isUp ? '正' : '逆'}位代表：${statement}`,
        cardName: p.card.name, cardId: p.cardId, orientation: p.orientation,
        options: ['对', '错'], correctIndex: correctAnswerBool ? 0 : 1, correctAnswer: correctAnswerBool ? '对' : '错',
        explanation: `${p.card.name}${isUp ? '正' : '逆'}位代表：${isUp ? p.card.ud : p.card.rd}`
      };
    } else if (type === 'fillblank') {
      return {
        type: 'fillblank', question: `"${p.card.name}"${isUp ? '正' : '逆'}位核心含义是？`,
        cardName: p.card.name, cardId: p.cardId, orientation: p.orientation,
        correctAnswer, keywords: correctAnswer.split(/[，,、；;\|\/\\\s]+/).filter(k=>k.trim()),
        hint: `提示：${isUp ? p.card.ud : p.card.rd}`,
        explanation: `${p.card.name}${isUp ? '正' : '逆'}位代表：${isUp ? p.card.uk+'，'+p.card.ud : p.card.rk+'，'+p.card.rd}`
      };
    } else if (type === 'recall') {
      const keywords = correctAnswer.split(/[，,、；;\|\/\\\s]+/).filter(k => k.trim());
      return {
        type: 'recall', question: '看着卡牌，输入所有核心关键词（用逗号分隔）',
        cardName: p.card.name, cardId: p.cardId, orientation: p.orientation,
        showImageOnly: true, correctAnswer, keywords,
        explanation: `${p.card.name}${isUp ? '正' : '逆'}位核心关键词：${correctAnswer}`
      };
    } else {
      const others = TAROT_CARDS.filter(c => c.id !== p.cardId && (isUp ? c.uk : c.rk)).map(c => ({text: isUp ? c.uk : c.rk}));
      const distractors = shuffle([...others]).slice(0, 3).map(d => d.text);
      const options = shuffle([correctAnswer, ...distractors]);
      return {
        type: 'single', question: `"${p.card.name}"${isUp ? '正' : '逆'}位核心含义是？`,
        cardName: p.card.name, cardId: p.cardId, orientation: p.orientation,
        options, correctIndex: options.indexOf(correctAnswer), correctAnswer,
        explanation: `${p.card.name}${isUp ? '正' : '逆'}位代表：${isUp ? p.card.ud : p.card.rd}`
      };
    }
  });
  
  currentExam = {
    questions: shuffle(questions),
    currentIndex: 0,
    timeLimit: 30,
    startTime: Date.now(),
    answers: [],
    totalCount: questions.length,
    isReview: true
  };
  
  showScreen('exam');
  renderQuestion();
  startExamTimer();
  
  // 500ms后解锁按钮
  setTimeout(() => {
    buttonLocks['startReview'] = false;
  }, 500);
}

// ======================== 进度展示 ========================
function renderProgress() {
  const progress = getProgress();
  const errors = getErrors();
  const exams = getExams();
  const listArea = document.getElementById('progress-list-area');
  const summary = document.getElementById('progress-summary');
  
  // 如果元素不存在（不在进度页），提前返回
  if (!listArea) return;
  
  // 分组
  const groups = [
    { name: '大阿卡纳', cards: TAROT_CARDS.filter(c => c.id <= 22) },
    { name: '宝剑', cards: TAROT_CARDS.filter(c => c.id >= 23 && c.id <= 36) },
    { name: '星币', cards: TAROT_CARDS.filter(c => c.id >= 37 && c.id <= 50) },
    { name: '权杖', cards: TAROT_CARDS.filter(c => c.id >= 51 && c.id <= 64) },
    { name: '圣杯', cards: TAROT_CARDS.filter(c => c.id >= 65 && c.id <= 78) }
  ];
  
  let totalSlots = 0, masteredSlots = 0;
  let html = '';
  
  groups.forEach(group => {
    let groupCards = [];
    group.cards.forEach(card => {
      ['upright', 'reversed'].forEach(ori => {
        const key = buildProgressKey(card.id, ori);
        const raw = progress[key];
        const prog = raw?.progress || 0;
        const hasError = errors[key] && errors[key].ec > 0;
        const isTimeout = errors[key] && errors[key].timeout;
        const isMastered = prog >= 100;
        
        // 筛选
        let show = true;
        if (progressFilter === 'stranger' && prog > 30) show = false;
        if (progressFilter === 'unmastered' && (prog < 30 || prog >= 100)) show = false;
        if (progressFilter === 'errors' && !hasError) show = false;
        if (progressFilter === 'mastered' && !isMastered) show = false;
        
        if (show) {
          groupCards.push({ card, ori, prog, hasError, isMastered, isTimeout });
        }
        
        totalSlots++;
        if (isMastered) masteredSlots++;
      });
    });
    
    if (groupCards.length > 0) {
      html += `<div class="progress-group"><h4>${group.name}</h4>`;
      groupCards.forEach(gc => {
        const barClass = gc.prog <= 30 ? 'low' : gc.prog <= 70 ? 'mid' : gc.prog < 100 ? 'high' : 'max';
        const sm2Data = getSM2Data(gc.card.id, gc.ori);
        const isDue = sm2Data.dueDate <= Date.now() && gc.prog < 100;
        html += `
          <div class="progress-card" data-card-id="${gc.card.id}" data-ori="${gc.ori}" data-card-name="${gc.card.name}">
            <div class="pc-header">
              <div>
                <span class="pc-name">${gc.card.name}</span>
                <span class="pc-ori ${gc.ori === 'upright' ? 'up' : 'rev'}">${gc.ori === 'upright' ? '正' : '逆'}</span>
                ${gc.hasError ? '<span style="color:#e08080;font-size:10px;margin-left:4px">有错题</span>' : ''}
                ${gc.isTimeout ? '<span style="color:#e0a060;font-size:10px;margin-left:4px">⏱️超时</span>' : ''}
                ${isDue ? '<span style="color:#e0a040;font-size:10px;margin-left:4px">⏰到期</span>' : ''}
              </div>
              <span style="font-size:13px;color:#8a7a60">${gc.prog}%</span>
            </div>
            <div class="progress-bar-wrap">
              <div class="progress-bar-fill ${barClass}" style="width:${gc.prog}%"></div>
            </div>
          </div>`;
      });
      html += '</div>';
    }
  });
  
  if (summary) {
    summary.textContent = `已掌握 ${masteredSlots}/${totalSlots}`;
  }
  listArea.innerHTML = html || '<div style="text-align:center;padding:20px;color:#8a7a60">当前筛选条件下无数据</div>';
  
  // 进度卡点击弹出详情
  listArea.querySelectorAll('.progress-card').forEach(el => {
    el.style.cursor = 'pointer';
    el.addEventListener('click', () => {
      const name = el.dataset.cardName;
      const ori = el.dataset.ori;
      const cardId = parseInt(el.dataset.cardId);
      if (cardId) showCardDetail(cardId, ori);
    });
  });
  
  // 更新薄弱 TOP 5
  const weakArea = document.getElementById('weak-top-area');
  const weakList = document.getElementById('weak-top-list');
  if (weakArea && weakList) {
    const allEntries = [];
    groups.forEach(group => {
      group.cards.forEach(card => {
        ['upright', 'reversed'].forEach(ori => {
          const key = buildProgressKey(card.id, ori);
          const raw = progress[key];
          const prog = raw?.progress || 0;
          const err = errors[key];
          allEntries.push({ card, ori, prog, errCount: err ? err.ec : 0 });
        });
      });
    });
    allEntries.sort((a, b) => a.prog - b.prog || b.errCount - a.errCount);
    const top5 = allEntries.slice(0, 5).filter(e => e.prog < 100);
    if (top5.length > 0) {
      weakArea.style.display = 'block';
      weakList.innerHTML = top5.map(e =>
        `<span style="cursor:pointer;color:#e0a0a0" onclick="showCardDetail(${e.card.id},'${e.ori}')">${e.card.name}${e.ori==='upright'?'正':'逆'}位(${e.prog}%)</span>`
      ).join(' → ');
    } else {
      weakArea.style.display = 'none';
    }
  }
  
  // 更新今日待复习
  const now = Date.now();
  let reviewCount = 0;
  for (const key in progress) {
    const raw = progress[key];
    if (raw?.dueDate && raw.dueDate <= now && (raw.progress || 0) < 100) reviewCount++;
  }
  const reviewArea = document.getElementById('review-today-area');
  const reviewCountEl = document.getElementById('review-today-count');
  if (reviewArea && reviewCountEl) {
    reviewCountEl.textContent = reviewCount;
    reviewArea.style.display = reviewCount > 0 ? 'block' : 'none';
  }
  
  // 更新统计仪表盘
  // 总答题数 & 平均正确率
  let totalQuestions = 0, totalCorrect = 0;
  exams.forEach(ex => { totalQuestions += ex.total || 0; totalCorrect += ex.score || 0; });
  const statTotalQ = document.getElementById('stat-total-q');
  const statAvgRate = document.getElementById('stat-avg-rate');
  if (statTotalQ) statTotalQ.textContent = totalQuestions;
  if (statAvgRate) statAvgRate.textContent = totalQuestions > 0 ? Math.round(totalCorrect / totalQuestions * 100) + '%' : '0%';
  
  // 总学习时长
  let totalSeconds = 0;
  exams.forEach(ex => { totalSeconds += ex.duration || 0; });
  const hours = Math.floor(totalSeconds / 3600);
  const mins = Math.floor((totalSeconds % 3600) / 60);
  const statTotalTime = document.getElementById('stat-total-time');
  if (statTotalTime) statTotalTime.textContent = hours > 0 ? `${hours}h${mins}m` : `${mins}m`;
  
  // 连续学习天数
  const statStreak = document.getElementById('stat-streak');
  if (statStreak && exams.length > 0) {
    // 获取去重的日期列表（只保留年月日，忽略时分秒）
    const uniqueDatesSet = new Set();
    exams.forEach(e => {
      const d = new Date(e.time);
      const dateKey = d.getFullYear() + '-' + (d.getMonth() + 1) + '-' + d.getDate();
      uniqueDatesSet.add(dateKey);
    });
    const uniqueDates = Array.from(uniqueDatesSet).sort().reverse();
    let streak = 0;
    
    // 计算今天和昨天的日期字符串
    const today = new Date();
    const yesterday = new Date(today);
    yesterday.setDate(yesterday.getDate() - 1);
    
    const getDateStr = (d) => d.getFullYear() + '-' + (d.getMonth() + 1) + '-' + d.getDate();
    const todayStr = getDateStr(today);
    const yesterdayStr = getDateStr(yesterday);
    
    // 检查最近一次学习是否是今天或昨天
    if (uniqueDates.length > 0 && (uniqueDates[0] === todayStr || uniqueDates[0] === yesterdayStr)) {
      streak = 1;
      // 检查连续学习的天数
      for (let i = 1; i < uniqueDates.length; i++) {
        // 创建前一天和当前天的Date对象（都设为0点，避免时差影响）
        const prevDate = new Date(uniqueDates[i-1]);
        prevDate.setHours(0, 0, 0, 0);
        const currDate = new Date(uniqueDates[i]);
        currDate.setHours(0, 0, 0, 0);
        
        // 计算日期差（精确到天）
        const diffTime = prevDate - currDate;
        const diffDays = Math.floor(diffTime / (1000 * 60 * 60 * 24));
        
        if (diffDays === 1) {
          streak++;
        } else {
          break;
        }
      }
    }
    
    statStreak.textContent = streak + '天';
  }
}

// ======================== 卡牌详情弹窗 ========================
function showCardDetail(cardId, orientation) {
  const card = getCardById(cardId);
  if (!card) return;
  const progress = getProgress();
  const errors = getErrors();
  const key = buildProgressKey(cardId, orientation);
  const raw = progress[key];
  const isUp = orientation === 'upright';
  const prog = raw?.progress || 0;
  const sm2 = getSM2Data(cardId, orientation);
  const err = errors[key];
  const errCount = err ? err.ec : 0;
  const ccCount = err ? err.cc : 0;
  const dueDate = sm2.dueDate ? new Date(sm2.dueDate) : new Date();
  const isDue = sm2.dueDate <= Date.now();
  
  document.getElementById('detail-card-name').textContent = `${card.name}`;
  document.getElementById('detail-card-ori').textContent = isUp ? '正位' : '逆位';
  document.getElementById('detail-card-ori').className = 'pc-ori ' + (isUp ? 'up' : 'rev');
  
  document.getElementById('detail-card-body').innerHTML = `
    <div>进度：<b style="color:#d4b87a">${prog}%</b></div>
    <div>SM-2间隔：<b style="color:#d4b87a">${sm2.interval}天</b></div>
    <div>难度系数：<b style="color:#d4b87a">${sm2.easeFactor.toFixed(1)}</b></div>
    <div>下次复习：<b style="color:${isDue ? '#e08080' : '#8ad88a'}">${dueDate.toLocaleDateString('zh-CN')}${isDue ? ' (已到期)' : ''}</b></div>
    <div>答对次数：<b style="color:#8ad88a">${sm2.correctCount}</b></div>
    <div>答错次数：<b style="color:#e08080">${errCount}</b>  |  连续正确：<b style="color:#8ad88a">${ccCount}</b></div>
    <div style="margin-top:10px;padding-top:10px;border-top:1px solid #2a2a4a;font-size:13px;color:#8a7a60">
      核心词：${isUp ? card.uk : card.rk}
    </div>
  `;
  
  document.getElementById('card-detail-modal').style.display = 'flex';
}

// ======================== UI 工具 ========================
function showScreen(name) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  const screenEl = document.getElementById('screen-' + name);
  if (screenEl) screenEl.classList.add('active');
  
  // 更新底部导航
  document.querySelectorAll('.navbar button').forEach(b => b.classList.remove('active'));
  const navBtn = document.getElementById('nav-' + name);
  if (navBtn) navBtn.classList.add('active');
  
  // 显示/隐藏导航栏
  const navbar = document.getElementById('navbar');
  if (name === 'exam' || name === 'result') {
    navbar.style.display = 'none';
  } else {
    navbar.style.display = 'flex';
  }
  
  // 切换时只清理定时器，不清空 currentExam（保留考试状态）
  if (name !== 'exam' && currentExam && name !== 'result') {
    // 记录暂停开始时间
    if (!currentExam.pauseStart) {
      currentExam.pauseStart = Date.now();
    }
    clearAllTimers(); // 使用统一的定时器清理函数
    // 保存到 localStorage（答题页面看不见导航，这个场景很少发生，但仍保留本地保存）
    saveExamState();
    // 保留 currentExam，切回 exam 时检查并恢复状态
  }
  
  // 切回 exam 时，检查并恢复考试状态
  if (name === 'exam') {
    // 情况1：currentExam 还在（没有刷新），只是切页离开又回来
    if (currentExam) {
      // 如果有暂停开始时间，计算暂停时间并累加到 pausedTime
      if (currentExam.pauseStart) {
        const pauseDuration = Date.now() - currentExam.pauseStart;
        currentExam.pausedTime = (currentExam.pausedTime || 0) + pauseDuration;
        currentExam.pauseStart = null;
        saveExamState();
      }
      // 重新渲染题目和计时器
      renderQuestion();
      startExamTimer();
    } else {
      // 情况2：currentExam 不在（刷新了），调用 resumeExam，它内部会处理加载
      resumeExam();
    }
  }
  
  // 渲染对应内容
  if (name === 'review') {
    reviewFilter = 'all';
    document.querySelectorAll('#screen-review .filter-tag').forEach((t, i) => t.classList.toggle('active', i === 0));
    renderReviewList();
  }
  if (name === 'progress') {
    progressFilter = 'all';
    document.querySelectorAll('#screen-progress .filter-tag').forEach((t, i) => t.classList.toggle('active', i === 0));
    renderProgress();
  }
  
  // 滚动到顶部
  window.scrollTo(0, 0);
}

function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2000);
}

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

// ======================== 事件绑定 ========================
// 页面关闭/刷新/切走前保存到localStorage（不做网络请求，避免异步失败）
// beforeunload 覆盖桌面刷新/关闭；pagehide 覆盖手机杀后台/bfcache（更可靠）
function saveExamToLocalBeforeUnload() {
  saveExamState();
}
window.addEventListener('beforeunload', saveExamToLocalBeforeUnload);
window.addEventListener('pagehide', saveExamToLocalBeforeUnload);

// 网络状态实时检测
window.addEventListener('online', () => {
  toast('网络已恢复');
  flushSyncRetryQueue();
});
window.addEventListener('offline', () => {
  toast('网络已断开，请检查网络连接');
});

// 进度筛选标签点击
document.querySelector('#screen-progress .progress-filter').addEventListener('click', e => {
  const tag = e.target.closest('.filter-tag');
  if (!tag) return;
  document.querySelectorAll('#screen-progress .filter-tag').forEach(t => t.classList.remove('active'));
  tag.classList.add('active');
  renderProgress();
});

// 错题筛选标签点击
document.querySelector('#screen-review .progress-filter').addEventListener('click', e => {
  const tag = e.target.closest('.filter-tag');
  if (!tag) return;
  document.querySelectorAll('#screen-review .filter-tag').forEach(t => t.classList.remove('active'));
  tag.classList.add('active');
  renderReviewList();
});

// 监听页面可见性变化（离开页面时暂停，回来时恢复）
document.addEventListener('visibilitychange', () => {
  if (!currentExam) return;
  if (document.hidden) {
    // 页面不可见，暂停考试
    pauseExamFromVisibility();
  } else {
    // 页面可见，恢复考试
    resumeExamFromVisibility();
  }
});

// ======================== 初始化 ========================
async function init() {
  const startBtn = document.getElementById('start-exam-btn');
  let networkOk = true;
  
  if (startBtn) {
    startBtn.disabled = true;
    startBtn.textContent = '加载中...';
  }
  
  try {
    const token = getAuthToken();
    
    // 加载配置数据（卡牌名称、推导数据等）—— 网络必须可用
    await loadConfigData();
    
    // 加载保存的时间限制
    const savedTime = localStorage.getItem('tarot_time_limit');
    if (savedTime) {
      const time = parseInt(savedTime);
      if ([30, 60, 90, 120].includes(time)) {
        setTimeLimit(time);
      }
    }
    
    // 加载数据库牌义数据（成功→DB牌义，失败→fallback）
    await loadCardDataFromDB();
    
    // 加载完成后渲染
    renderProgress();
    
    // 首页显示总掌握率
    updateHomeMastery();
    
    // 生成初始随机题型比例显示
    allocateQuestionTypes(100);
    
    // 从服务器同步所有数据（服务器是唯一数据源）
    if (token && navigator.onLine) {
      const [pUpdated, eUpdated, xUpdated, cUpdated, examResult] = await Promise.all([
        loadServerProgress(),
        loadServerErrors(),
        loadServerExams(),
        loadServerConfuseErrors(),
        fetchExamStateFromServer()
      ]);
      networkOk = examResult.hasServerData || xUpdated !== false;
      updateHomeMastery();
      renderProgress();
      
      if (pUpdated || eUpdated || xUpdated || cUpdated) {
        toast('数据同步完成');
      } else {
        toast('数据已最新');
      }
      
      // 检查是否有未完成的考试
      if (examResult && examResult.state) {
        document.getElementById('resume-modal').style.display = 'flex';
      }
    } else if (token && !navigator.onLine) {
      networkOk = false;
    }
    
    // 网络不可用时提示
    if (!networkOk) {
      toast('网络连接不可用，部分数据可能不是最新');
    }
  } catch (e) {
    console.error('初始化错误:', e);
    try {
      if (TAROT_CARDS.length === 0) {
        buildFallbackCards();
      }
    } catch (e2) {
      console.error('加载fallback失败:', e2);
    }
    toast('网络连接不可用，请检查网络后刷新页面');
  }
  
  // 启用按钮
  if (startBtn) {
    startBtn.disabled = false;
    startBtn.textContent = '开始训练';
  }
}

init();
</script>
