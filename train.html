<!DOCTYPE html>
<html lang="zh-CN">
<head>
<link rel="icon" href="data:,">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="robots" content="noindex, nofollow, noarchive, nosnippet, noimageindex">
<meta name="googlebot" content="noindex, nofollow, noarchive, nosnippet">
<meta name="baiduspider" content="noindex, nofollow">
<meta name="slurp" content="noindex, nofollow">
<meta name="bingbot" content="noindex, nofollow">
<title>塔罗牌义记忆训练</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:system-ui,-apple-system,sans-serif;background:#1a1a2e;color:#e0d8c8;min-height:100vh;overflow-x:hidden}
.screen{display:none;padding:16px;min-height:100vh}
.screen.active{display:block}
#screen-exam,#screen-result{padding-bottom:16px}

/* 顶部标题栏 */
.topbar{display:flex;align-items:center;justify-content:space-between;padding:8px 0 16px;border-bottom:1px solid #2a2a4a;margin-bottom:16px}
.topbar .back-btn{background:none;border:none;color:#a09070;font-size:20px;cursor:pointer;padding:4px 8px}
.topbar h1{font-size:18px;color:#d4b87a;font-weight:600}
.topbar .menu-btn{background:none;border:none;color:#a09070;font-size:18px;cursor:pointer;padding:4px 8px}

/* 底部导航 */
.navbar{position:fixed;bottom:0;left:0;right:0;background:#16213e;display:flex;border-top:1px solid #2a2a4a;z-index:100}
.navbar button{flex:1;padding:12px 8px;background:none;border:none;color:#8a7a60;font-size:12px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:4px}
.navbar button.active{color:#d4b87a}
.navbar button .nav-icon{font-size:18px}

/* 通用 */
.card{padding:16px;border-radius:12px;margin-bottom:12px}
label{font-size:13px;color:#8a7a60;margin-bottom:4px;display:block}
input,select{width:100%;padding:12px;border-radius:8px;border:1px solid #3a3a5a;background:#16213e;color:#e0d8c8;font-size:15px;margin-bottom:12px}
input:focus,select:focus{outline:none;border-color:#d4b87a}
.btn{width:100%;padding:14px;border-radius:10px;border:none;font-size:16px;font-weight:600;cursor:pointer;margin-bottom:10px;transition:all .2s}
.btn:active{transform:scale(.97)}
.btn-primary{background:linear-gradient(135deg,#d4b87a,#b8955a);color:#1a1a2e}
.btn-outline{background:transparent;border:1px solid #d4b87a;color:#d4b87a}
.btn-danger{background:#4a2020;color:#e0a0a0;border:1px solid #6a3030}
.btn-sm{padding:8px 16px;font-size:13px;width:auto;display:inline-block}

/* 参数设置 */
.setup-card{border:1px solid #3a3a5a;background:#16213e;padding:20px;border-radius:14px;margin-bottom:16px}
.setup-card h3{font-size:15px;color:#d4b87a;margin-bottom:14px}
.option-row{display:flex;gap:10px;flex-wrap:wrap}
.option-tag{padding:8px 14px;border-radius:20px;border:1px solid #3a3a5a;font-size:13px;cursor:pointer;background:#1a1a2e;color:#8a7a60;transition:all .2s}
.option-tag.selected{background:#2a2030;border-color:#d4b87a;color:#d4b87a}
.range-row{display:flex;align-items:center;gap:10px}
.range-row input[type=range]{flex:1;margin:0}

/* 答题界面 */
.quiz-header{display:flex;justify-content:space-between;align-items:center;padding:12px 0;margin-bottom:16px}
.quiz-progress-text{font-size:13px;color:#8a7a60}
.quiz-timer{font-size:15px;color:#d4b87a;font-weight:600}
.quiz-timer.warning{color:#e06060;animation:blink .5s infinite}
@keyframes blink{50%{opacity:.5}}
.quiz-question{margin-bottom:20px}
.quiz-question .card-name{font-size:20px;color:#fff;font-weight:700;margin-bottom:8px}
.quiz-question .orientation-tag{display:inline-block;padding:4px 12px;border-radius:12px;font-size:13px;margin-bottom:12px}
.orientation-tag.upright{background:#2a3a20;color:#8ad88a}
.orientation-tag.reversed{background:#3a2020;color:#e08080}
.quiz-question .q-text{font-size:15px;color:#c0b8a8;line-height:1.6}
.quiz-card-img{display:block;width:120px;height:auto;border-radius:10px;margin:0 auto 12px;box-shadow:0 4px 20px rgba(0,0,0,.3)}
.quiz-card-img.large{width:60vw;max-width:300px}
.quiz-card-img.pending{width:60vw;max-width:300px;animation:pulse 2s infinite}
@keyframes pulse{50%{box-shadow:0 0 30px rgba(212,184,122,.3)}}
.quiz-options{display:flex;flex-direction:column;gap:10px}
.quiz-option{padding:16px;border-radius:10px;border:1px solid #3a3a5a;background:#16213e;font-size:15px;color:#e0d8c8;cursor:pointer;text-align:left;transition:all .2s;line-height:1.5;min-height:48px;display:flex;align-items:center}
.quiz-option:active{background:#2a2a4a}
.quiz-option.correct{background:#1a3a1a;border-color:#4a8a4a;color:#a0f0a0}
.quiz-option.wrong{background:#3a1a1a;border-color:#8a4a4a;color:#f0a0a0}
.quiz-option.disabled{pointer-events:none;opacity:.8}
.quiz-input-wrap{display:flex;gap:8px}
.quiz-input-wrap input{flex:1;margin:0}
.quiz-input-wrap button{width:auto}
.quiz-feedback{text-align:left;padding:20px;margin-top:12px;border-radius:12px;font-size:14px;line-height:1.7}
.quiz-feedback.correct{background:linear-gradient(135deg,#1a2e1a,#162416);border:1px solid #2a4a2a;color:#d0e8d0}
.quiz-feedback.wrong{background:linear-gradient(135deg,#2e1a1a,#241616);border:1px solid #4a2a2a;color:#e0d0c8}
.fb-status{font-size:15px;font-weight:600;margin-bottom:14px;padding-bottom:12px;border-bottom:1px solid rgba(255,255,255,.06);display:flex;align-items:center;gap:6px}
.fb-status.correct{color:#7acc7a}
.fb-status.wrong{color:#d47a7a}
.fb-body{padding:0}
.fb-identity{font-size:17px;font-weight:700;margin-bottom:12px;color:#f0e8d8}
.fb-identity .fb-orient{display:inline-block;padding:1px 10px;border-radius:6px;font-size:11px;font-weight:500;margin-left:8px;vertical-align:middle;letter-spacing:.5px}
.fb-identity .fb-orient.up{background:rgba(74,138,74,.2);color:#7acc7a}
.fb-identity .fb-orient.rev{background:rgba(200,80,80,.2);color:#d47a7a}
.fb-answer{font-size:13px;color:#a09070;margin-bottom:14px;padding-bottom:14px;border-bottom:1px solid rgba(255,255,255,.06);display:flex;flex-wrap:wrap;gap:6px}
.fb-section{margin-bottom:14px}
.fb-section:last-of-type{margin-bottom:0}
.fb-section-label{font-size:11px;text-transform:uppercase;letter-spacing:1px;margin-bottom:6px;font-weight:600}
.quiz-feedback.correct .fb-section-label{color:#5a8a5a}
.quiz-feedback.wrong .fb-section-label{color:#8a5a5a}
.fb-tags{display:flex;flex-wrap:wrap;gap:6px}
.fb-tag{padding:4px 14px;border-radius:14px;font-size:13px;background:rgba(212,184,122,.1);border:1px solid rgba(212,184,122,.2);color:#d4b87a;line-height:1.4}
.fb-detail{font-size:13px;color:#a09070;line-height:1.7;padding:10px 14px;border-radius:8px;background:rgba(0,0,0,.15);margin-top:4px}
.quiz-next-btn{margin-top:16px}

/* 结果页 */
.result-score{text-align:center;padding:30px 0}
.result-score .big-num{font-size:56px;font-weight:800;color:#d4b87a}
.result-score .label{font-size:14px;color:#8a7a60;margin-top:4px}
.result-stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin:20px 0}
.stat-item{background:#16213e;border-radius:10px;padding:14px;text-align:center;border:1px solid #2a2a4a}
.stat-item .val{font-size:20px;font-weight:700;color:#d4b87a}
.stat-item .lbl{font-size:11px;color:#8a7a60;margin-top:4px}
.error-list{max-height:300px;overflow-y:auto;margin:16px 0}
.error-item{display:flex;justify-content:space-between;align-items:center;padding:12px;border-bottom:1px solid #2a2a4a;font-size:14px}
.error-item .err-card{color:#e08080}
.error-item .err-answer{color:#8a7a60;font-size:12px}

/* 进度页 */
.progress-filter{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px}
.progress-filter .filter-tag{padding:6px 14px;border-radius:16px;font-size:12px;cursor:pointer;background:#16213e;border:1px solid #3a3a5a;color:#8a7a60}
.progress-filter .filter-tag.active{background:#2a2030;border-color:#d4b87a;color:#d4b87a}
.progress-group{margin-bottom:20px}
.progress-group h4{font-size:14px;color:#d4b87a;margin-bottom:10px;padding-bottom:6px;border-bottom:1px solid #2a2a4a}
.progress-card{padding:12px;margin-bottom:8px;border-radius:8px;background:#16213e;border:1px solid #2a2a4a}
.progress-card .pc-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.progress-card .pc-name{font-size:14px;font-weight:600}
.progress-card .pc-ori{font-size:11px;padding:2px 8px;border-radius:8px}
.progress-card .pc-ori.up{background:#1a2a1a;color:#8ad88a}
.progress-card .pc-ori.rev{background:#2a1a1a;color:#e08080}
.progress-bar-wrap{height:8px;background:#1a1a2e;border-radius:4px;overflow:hidden}
.progress-bar-fill{height:100%;border-radius:4px;transition:width .5s}
.progress-bar-fill.low{background:#e06060}
.progress-bar-fill.mid{background:#d4b87a}
.progress-bar-fill.high{background:#60c060}
.progress-bar-fill.max{background:#40a0ff}

/* 错题强化 */
.review-empty{text-align:center;padding:40px 20px}
.review-empty .icon{font-size:48px;margin-bottom:12px}
.review-empty p{color:#8a7a60;font-size:14px}

/* toast */
.toast{position:fixed;top:70px;left:50%;transform:translateX(-50%);background:linear-gradient(135deg,#d4b87a,#b8955a);color:#1a1a2e;padding:12px 28px;border-radius:24px;font-size:14px;z-index:2000;opacity:0;transition:opacity .3s;box-shadow:0 4px 20px rgba(212,184,122,.4);font-weight:600}
.toast.show{opacity:1}
</style>
</head>
<body>

<!-- Toast -->
<div class="toast" id="toast"></div>

<!-- 恢复考试提示弹窗 -->
<div id="resume-modal" style="position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.7);display:none;justify-content:center;align-items:center;z-index:1000;padding:20px">
  <div style="background:#16213e;border-radius:16px;padding:24px;max-width:360px;width:100%;border:1px solid #3a3a5a">
    <h3 style="font-size:18px;color:#d4b87a;margin-bottom:8px;text-align:center">继续上次的考试？</h3>
    <p style="font-size:14px;color:#8a7a60;text-align:center;margin-bottom:24px">上次您还有未完成的题目，是否继续？</p>
    <div style="display:flex;gap:10px">
      <button class="btn btn-outline btn-sm" onclick="clearExamState();document.getElementById('resume-modal').style.display='none'">重新开始</button>
      <button class="btn btn-primary btn-sm" onclick="resumeExam()">继续考试</button>
    </div>
  </div>
</div>

<!-- 底部导航（仅在主屏显示） -->
<nav class="navbar" id="navbar">
  <button onclick="showScreen('setup')" id="nav-setup"><span class="nav-icon">📝</span>训练</button>
  <button onclick="showScreen('review')" id="nav-review"><span class="nav-icon">🔄</span>错题</button>
  <button onclick="showScreen('progress')" id="nav-progress"><span class="nav-icon">📊</span>进度</button>
</nav>

<!-- ========== 屏幕1：首页 ========== -->
<div class="screen active" id="screen-setup">
  <div class="topbar">
    <span></span>
    <h1>塔罗牌义记忆训练</h1>
    <span></span>
  </div>

  <div style="padding:20px">
    <div style="text-align:center;padding:30px 0">
      <div style="font-size:64px;margin-bottom:16px">🃏</div>
      <p style="color:#8a7a60;font-size:14px;line-height:1.8;margin-bottom:24px">
        100题 · 全部78张牌 · 正位+逆位 · 薄弱优先
      </p>
      <div style="color:#6a5a40;font-size:12px;margin-bottom:12px" id="type-ratio-info">
        题型比例：随机
      </div>
      <div style="color:#6a5a40;font-size:12px" id="home-mastery-info"></div>
    </div>

    <div class="setup-card">
      <h3>每题时间限制</h3>
      <div class="option-row" id="time-options">
        <span class="option-tag selected" data-time="30" onclick="setTimeLimit(30)">30秒</span>
        <span class="option-tag" data-time="60" onclick="setTimeLimit(60)">60秒</span>
        <span class="option-tag" data-time="90" onclick="setTimeLimit(90)">90秒</span>
        <span class="option-tag" data-time="120" onclick="setTimeLimit(120)">120秒</span>
      </div>
    </div>

    <div style="text-align:center;margin-top:20px">
      <button class="btn btn-primary" id="start-exam-btn" onclick="startExam()" style="max-width:280px;margin:0 auto" disabled>加载中...</button>
      <button class="btn" style="background:none;color:#6a4a4a;font-size:12px;padding:8px;margin-top:8px;border:none;text-decoration:underline" onclick="clearAllData()">清空数据，重新开始</button>
    </div>
  </div>
</div>

<!-- ========== 屏幕2：答题中 ========== -->
<div class="screen" id="screen-exam">
  <div class="topbar">
    <span style="font-size:13px;color:#8a7a60" id="exam-info">考试中</span>
    <h1 id="exam-title">第 1/10 题</h1>
  </div>

  <div class="quiz-header">
    <span class="quiz-progress-text" id="quiz-type-label">单选题</span>
    <span class="quiz-timer" id="quiz-timer">30s</span>
  </div>

  <div class="quiz-question" id="quiz-question-area"></div>
  <div class="quiz-options" id="quiz-options-area"></div>
  <div id="quiz-feedback-area"></div>
</div>

<!-- ========== 屏幕3：考试结果 ========== -->
<div class="screen" id="screen-result">
  <div class="topbar">
    <span></span>
    <h1>考试结果</h1>
    <span></span>
  </div>

  <div class="result-score">
    <div class="big-num" id="result-score">0</div>
    <div class="label">正确率</div>
  </div>

  <div class="result-stats">
    <div class="stat-item">
      <div class="val" id="result-total">0</div>
      <div class="lbl">总题数</div>
    </div>
    <div class="stat-item">
      <div class="val" id="result-correct">0</div>
      <div class="lbl">答对</div>
    </div>
    <div class="stat-item">
      <div class="val" id="result-duration">0s</div>
      <div class="lbl">用时</div>
    </div>
  </div>

  <h3 style="font-size:14px;color:#d4b87a;margin:16px 0 8px">错题回顾</h3>
  <div class="error-list" id="error-review-list"></div>

  <button class="btn btn-primary" onclick="showScreen('setup')">再来一场</button>
  <button class="btn btn-outline" onclick="startReview(true)" style="margin-bottom:80px">错题强化</button>
</div>

<!-- ========== 屏幕4：错题强化 ========== -->
<div class="screen" id="screen-review">
  <div class="topbar">
    <span></span>
    <h1>错题强化</h1>
    <span style="font-size:12px;color:#8a7a60" id="review-count-info"></span>
  </div>

  <div class="progress-filter" style="margin-bottom:12px">
    <span class="filter-tag active" onclick="reviewFilter='all';renderReviewList()">全部错题</span>
    <span class="filter-tag" onclick="reviewFilter='weak';renderReviewList()">薄弱卡牌</span>
  </div>

  <div id="review-list-area">
    <div class="review-empty">
      <div class="icon">🎉</div>
      <p>暂无错题，继续保持！</p>
    </div>
  </div>

  <button class="btn btn-primary" id="review-start-btn" onclick="startReview()" style="margin-top:16px">开始错题训练</button>
</div>

<!-- ========== 屏幕5：记忆进度 ========== -->
<div class="screen" id="screen-progress">
  <div class="topbar">
    <span></span>
    <h1>记忆进度</h1>
    <span style="font-size:12px;color:#8a7a60" id="progress-summary"></span>
  </div>

  <div class="progress-filter">
    <span class="filter-tag active" data-pf="all" onclick="progressFilter='all';renderProgress()">全部</span>
    <span class="filter-tag" data-pf="stranger" onclick="progressFilter='stranger';renderProgress()">陌生(0-30%)</span>
    <span class="filter-tag" data-pf="unmastered" onclick="progressFilter='unmastered';renderProgress()">未精通(30-99%)</span>
    <span class="filter-tag" data-pf="errors" onclick="progressFilter='errors';renderProgress()">有错题</span>
    <span class="filter-tag" data-pf="mastered" onclick="progressFilter='mastered';renderProgress()">已掌握(100%)</span>
  </div>

  <div class="result-stats" id="progress-stats" style="margin:16px 0;grid-template-columns:1fr 1fr 1fr 1fr">
    <div class="stat-item"><div class="val" id="stat-total-q">0</div><div class="lbl">总答题</div></div>
    <div class="stat-item"><div class="val" id="stat-avg-rate">0%</div><div class="lbl">平均正确率</div></div>
    <div class="stat-item"><div class="val" id="stat-total-time">0h</div><div class="lbl">总学习时长</div></div>
    <div class="stat-item"><div class="val" id="stat-streak">0天</div><div class="lbl">连续学习</div></div>
  </div>

  <div id="weak-top-area" style="background:#2a1a1a;border:1px solid #4a2a2a;border-radius:10px;padding:12px;margin-bottom:16px;display:none">
    <div style="font-size:13px;color:#e08080;font-weight:600;margin-bottom:8px">🔴 最薄弱 TOP 5</div>
    <div id="weak-top-list" style="font-size:13px;color:#c0b8a8;line-height:1.8"></div>
  </div>

  <div style="background:#1a2a1a;border:1px solid #2a4a2a;border-radius:10px;padding:12px;margin-bottom:16px;display:none" id="review-today-area">
    <div style="font-size:13px;color:#80e080;font-weight:600">📅 今日待复习：<span id="review-today-count">0</span> 张</div>
  </div>

  <div id="progress-list-area"></div>
</div>

<!-- 卡牌详情弹窗 -->
<div id="card-detail-modal" style="display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.8);z-index:200;justify-content:center;align-items:center" onclick="if(event.target===this)this.style.display='none'">
  <div style="background:#16213e;border-radius:14px;padding:24px;max-width:340px;width:90%;border:1px solid #3a3a5a">
    <div style="display:flex;justify-content:space-between;align-items:start;margin-bottom:16px">
      <div>
        <div style="font-size:18px;color:#fff;font-weight:700" id="detail-card-name"></div>
        <span style="font-size:12px;padding:2px 10px;border-radius:8px;margin-top:4px;display:inline-block" id="detail-card-ori"></span>
      </div>
      <button style="background:none;border:none;color:#8a7a60;font-size:20px;cursor:pointer" onclick="document.getElementById('card-detail-modal').style.display='none'">✕</button>
    </div>
    <div id="detail-card-body" style="font-size:14px;color:#c0b8a8;line-height:2"></div>
  </div>
</div>

<script>
// ======================== 全局状态 ========================
const STORAGE_KEY_PROGRESS = 'taro_train_progress';
const STORAGE_KEY_ERRORS = 'taro_train_errors';
const STORAGE_KEY_EXAMS = 'taro_train_exams';
const STORAGE_KEY_CONFUSE_ERRORS = 'taro_train_confuse_errors';
const STORAGE_KEY_EXAM_STATE = 'taro_exam_state';
const API_BASE_URL = '/api';
let progressFilter = 'all', reviewFilter = 'all';
let currentExam = null, examTimer = null, questionTimer = null;
let pendingImageTimerId = null, pendingImageCdInterval = null, pendingImageFallbackId = null;
let selectedTimeLimit = 30; // 默认30秒
let buttonLocks = {}; // 按钮防抖锁

// 清理所有定时器
function clearAllTimers() {
  if (examTimer) { clearInterval(examTimer); examTimer = null; }
  if (questionTimer) { clearInterval(questionTimer); questionTimer = null; }
  if (pendingImageTimerId) { clearTimeout(pendingImageTimerId); pendingImageTimerId = null; }
  if (pendingImageCdInterval) { clearTimeout(pendingImageCdInterval); pendingImageCdInterval = null; }
  if (pendingImageFallbackId) { clearTimeout(pendingImageFallbackId); pendingImageFallbackId = null; }
}

// ======================== 考试状态保存 ========================
// 服务器是唯一数据源，本地 localStorage 仅做缓存和异步提交缓冲
// saveExamState() → 只保存到 localStorage（快速，无网络开销）
// syncExamAnswerToServer() → 增量同步（每答1题，轻量，只传1道题答案）
// syncExamStateToServer() → 全量同步（考试开始/交卷，确保完整）

function saveExamState() {
  if (!currentExam) return;
  
  const state = {
    questions: currentExam.questions,
    currentIndex: currentExam.currentIndex,
    answers: currentExam.answers,
    timeLimit: currentExam.timeLimit,
    examType: currentExam.examType,
    startTime: currentExam.startTime,
    pausedTime: currentExam.pausedTime || 0,
    pauseStart: currentExam.pauseStart,
    questionRemaining: currentExam.questionRemaining,
    pausePhase: currentExam.pausePhase,
    isReview: currentExam.isReview
  };
  
  try {

// 增量答题同步：每答1题，只同步「当前这道题的答案」，不会把100道题都提交
// 失败时自动加入重试队列，网络恢复后自动重试
const syncRetryQueue = [];
let syncRetryTimer = null;

function syncExamAnswerToServer(answerData, currentIndex) {
  if (!answerData) return;
  
  // 离线时直接加入重试队列
  if (!navigator.onLine) {
    syncRetryQueue.push({ answerData, currentIndex });
    if (syncRetryQueue.length > 100) syncRetryQueue.shift();
    return;
  }
  
  try {
    const token = getAuthToken();
    if (!token) return;
    
    fetch(`${API_BASE_URL}/training/exam-state/answer`, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': `Bearer ${token}`
      },
      body: JSON.stringify({
        currentIndex: currentIndex,
        answer: answerData
      })
    }).then(res => {
      if (!res.ok) syncRetryQueue.push({ answerData, currentIndex });
    }).catch(() => {
      syncRetryQueue.push({ answerData, currentIndex });
    });
  } catch (e) {
    syncRetryQueue.push({ answerData, currentIndex });
  }
}

// 刷新重试队列（网络恢复时调用，每次处理最多 50 条）
function flushSyncRetryQueue() {
  if (!navigator.onLine || syncRetryQueue.length === 0) return;
  if (syncRetryTimer) clearTimeout(syncRetryTimer);
  
  // 批量处理，每次最多 50 条
  const batchSize = Math.min(50, syncRetryQueue.length);
  for (let i = 0; i < batchSize; i++) {
    const item = syncRetryQueue.shift();
    if (item) {
      syncExamAnswerToServer(item.answerData, item.currentIndex);
    }
  }
  
  if (syncRetryQueue.length > 0) {
    syncRetryTimer = setTimeout(flushSyncRetryQueue, 500);
  }
}

// 从服务器加载考试状态（服务器是唯一数据源）
// 返回：{ state: 对象 | null, hasServerData: boolean }
async function fetchExamStateFromServer() {
  try {
    const token = getAuthToken();
    if (!token) return { state: null, hasServerData: false };
    
    const res = await fetch(`${API_BASE_URL}/training/exam-state`, {
      headers: { 'Authorization': `Bearer ${token}` }
    });
    
    if (res.ok) {
      const data = await res.json();
      if (data.exam_state && data.exam_state !== '{}') {
        const state = JSON.parse(data.exam_state);
        // 缓存到 localStorage（为页面渲染加速）
        try {
          localStorage.setItem(STORAGE_KEY_EXAM_STATE, JSON.stringify(state));
        } catch (e) {}
        return { state, hasServerData: true };
      }
    }
    return { state: null, hasServerData: true };
  } catch (e) {
    console.error('从服务器加载考试状态失败:', e);
    // 网络不可用 → 降级到本地缓存
    const cached = getCachedExamState();
    return { state: cached, hasServerData: false };
  }
}

// 恢复考试（从本地缓存读取，init 时已从服务器同步到本地）
async function resumeExam() {
  // 断网时禁止继续考试
  if (!navigator.onLine) {
    toast('网络连接不可用，无法继续考试');
    document.getElementById('resume-modal').style.display = 'none';
    return;
  }
  
  let state = getCachedExamState();
  
  // 缓存没有时，再从服务器拉取
  if (!state) {
    const result = await fetchExamStateFromServer();
    state = result.state;
  }
  
  if (!state) {
    document.getElementById('resume-modal').style.display = 'none';
    return;
  }
  
  // 计算暂停时间
  let pausedTime = state.pausedTime || 0;
  if (state.pauseStart) {
    pausedTime += Date.now() - state.pauseStart;
  }
  
  currentExam = {
    questions: state.questions,
    currentIndex: state.currentIndex,
    answers: (state.answers || []).filter(a => a != null), // 过滤稀疏数组中的空位
    timeLimit: state.timeLimit,
    startTime: state.startTime,
    pausedTime: pausedTime,
    questionStartTime: Date.now(),
    questionRemaining: state.questionRemaining,
    pausePhase: state.pausePhase,
    totalCount: state.questions.length,
    examType: state.examType || 'normal',
    isReview: state.isReview || false
  };
  
  document.getElementById('resume-modal').style.display = 'none';
  showScreen('exam');
  renderQuestion();
  startExamTimer();
}

function getCardAnchors(cardId, orientation) {
  const card = getCardById(cardId);
  if (!card || !card.pattern) return null;
  // 从pattern字段提取：正位画面后面的内容到</div>，或逆位画面后面的内容到</div>
  const isUp = orientation === 'upright';
  const prefix = isUp ? '正位画面' : '逆位画面';
  // 同时支持带 "- " 前缀和不带前缀的格式
  const regex = new RegExp('(-\\s*)?' + prefix + '[：:]\\s*(.*?)(?:<\\/div|$)', 's');
  const m = card.pattern.match(regex);
  if (!m) return null;
  const raw = m[2].replace(/<[^>]+>/g, '').trim();
  if (!raw) return null;
  // 按标点符号分割为锚点数组
  const anchors = raw.split(/[，,、；;。.\s]+/).filter(a => a.trim().length >= 2);
  return anchors.length > 0 ? anchors : null;
}

function getCardType(cardId) {
  if (cardId <= 22) return '大阿卡纳';
  if (cardId <= 36) return '宝剑';
  if (cardId <= 50) return '星币';
  if (cardId <= 64) return '权杖';
  return '圣杯';
}

// ==================== SM-2算法配置 ====================

// 更新SM-2参数
function updateSM2(cardId, orientation, isCorrect, answerTime) {
  const key = buildProgressKey(cardId, orientation);
  const progress = getProgress();
  const existingItem = progress[key];
  
  // 确保item的所有字段都是合法值
  const item = {
    interval: (existingItem && typeof existingItem.interval === 'number' && !isNaN(existingItem.interval) && existingItem.interval > 0) ? existingItem.interval : 1,
    easeFactor: (existingItem && typeof existingItem.easeFactor === 'number' && !isNaN(existingItem.easeFactor)) ? Math.max(1.3, Math.min(3.0, existingItem.easeFactor)) : 2.5,
    dueDate: (existingItem && typeof existingItem.dueDate === 'number' && !isNaN(existingItem.dueDate) && existingItem.dueDate > 0) ? existingItem.dueDate : Date.now(),
    progress: (existingItem && typeof existingItem.progress === 'number' && !isNaN(existingItem.progress)) ? Math.max(0, Math.min(100, existingItem.progress)) : 0,
    correctCount: (existingItem && typeof existingItem.correctCount === 'number' && !isNaN(existingItem.correctCount)) ? Math.max(0, existingItem.correctCount) : 0,
    errorCount: (existingItem && typeof existingItem.errorCount === 'number' && !isNaN(existingItem.errorCount)) ? Math.max(0, existingItem.errorCount) : 0
  };
  
  // 根据当前题的时间限制动态计算阈值
  const timeLimit = (currentExam && currentExam.timeLimit) ? currentExam.timeLimit : 30;
  const fastThreshold = timeLimit * 500; // 50%时间内答对=快速
  const normalThreshold = timeLimit * 800; // 80%时间内答对=正常
  
  if (isCorrect) {
    if (answerTime < fastThreshold) {
      // 快速答对：间隔×2.5，难度系数+0.1
      item.interval = Math.max(1, Math.round(item.interval * 2.5));
      item.easeFactor = Math.min(3.0, item.easeFactor + 0.1);
    } else if (answerTime < normalThreshold) {
      // 正常答对：间隔×1.5，难度系数不变
      item.interval = Math.max(1, Math.round(item.interval * 1.5));
    } else {
      // 慢答对：间隔×1.2，难度系数-0.1
      item.interval = Math.max(1, Math.round(item.interval * 1.2));
      item.easeFactor = Math.max(1.3, item.easeFactor - 0.1);
    }
  } else {
    // 答错：间隔重置为1天，难度系数-0.2
    item.interval = 1;
    item.easeFactor = Math.max(1.3, item.easeFactor - 0.2);
  }
  
  // 安全计算下次到期时间
  const safeDueDate = Date.now() + Math.max(0, item.interval) * 86400000;
  item.dueDate = safeDueDate;
  progress[key] = item;
  saveProgress(progress);
  return item;
}

// 解析DB中单张牌的 meaning 对象为训练格式
function parseCardMeaning(dbCard) {
  const fb = TRAIN_FALLBACK[dbCard.card_id - 1] || {};
  let uk = fb.uk || '', ud = fb.ud || '', rk = fb.rk || '', rd = fb.rd || '';
  
  // 1. upright 字段：去掉"正位："前缀，全部作为 uk（关键词，支持多个）
  if (dbCard.upright) {
    const m = dbCard.upright.match(/^正位[：:]\s*(.+)/);
    if (m) uk = m[1].trim();
  }
  
  // 2. reversed 字段：去掉"逆位："前缀，全部作为 rk（关键词，支持多个）
  if (dbCard.reversed) {
    const m = dbCard.reversed.match(/^逆位[：:]\s*(.+)/);
    if (m) rk = m[1].trim();
  }
  
  // 3. pattern 字段：分别提取正位和逆位的详细解释
  if (dbCard.pattern) {
    // 提取正位详细解释："正位："后面到下一个<div>开始之前，去除HTML标签
    const um = dbCard.pattern.match(/正位[：:]\s*(.*?)(?=<div)/s);
    if (um) ud = um[1].replace(/<[^>]+>/g, '').trim();
    
    // 提取逆位详细解释："逆位："后面到</div>前面结束，去除HTML标签
    const rm = dbCard.pattern.match(/逆位[：:]\s*(.*?)(?=<\/div)/s);
    if (rm) rd = rm[1].replace(/<[^>]+>/g, '').trim();
  }
  
  return {
    id: dbCard.card_id,
    name: dbCard.name || TAROT_NAMES[dbCard.card_id] || '',
    type: getCardType(dbCard.card_id),
    uk, ud, rk, rd,
    pattern: dbCard.pattern || ''
  };
}

  if (!str) return defaultValue;
  try {
    const parsed = JSON.parse(str);
    return parsed !== null && parsed !== undefined ? parsed : defaultValue;
  } catch(e) {
    console.warn('JSON解析失败，返回默认值:', e);
    return defaultValue;
  }
}

  const pairs = getConfuseErrors();

  if (!pair) return;
  const pairKey = pair.sort((a,b)=>a-b).join('_');

  return { interval: item.interval || 1, easeFactor: item.easeFactor || 2.5, dueDate: item.dueDate || Date.now(), progress: item.progress || 0, correctCount: item.correctCount || 0, errorCount: item.errorCount || 0 };
}

function updateProgress(cardId, orientation, isCorrect, answerTime, noSync) {
  const p = getProgress();
  const key = buildProgressKey(cardId, orientation);
  const oldItem = p[key] || { progress: 0, correctCount: 0, errorCount: 0, interval: 1, easeFactor: 2.5, dueDate: Date.now() };
  // 保留原有进度加减分
  const newProgress = isCorrect ? Math.min(100, oldItem.progress + 10) : Math.max(0, oldItem.progress - 15);
  // 更新SM-2
  const sm2Item = updateSM2(cardId, orientation, isCorrect, answerTime);
  sm2Item.progress = newProgress;
  sm2Item.correctCount = isCorrect ? (oldItem.correctCount || 0) + 1 : oldItem.correctCount || 0;
  sm2Item.errorCount = isCorrect ? oldItem.errorCount || 0 : (oldItem.errorCount || 0) + 1;
  p[key] = sm2Item;
  saveProgress(p);
  // 同步到服务端（批量操作时可跳过）
  if (!noSync) {
    syncProgressToServer(cardId, orientation, isCorrect, sm2Item.interval, sm2Item.easeFactor, sm2Item.dueDate, sm2Item.progress, sm2Item.correctCount, sm2Item.errorCount);
  }
  return newProgress;
}

function recordError(cardId, orientation, isCorrect, noSync, isTimeout) {
  const e = getErrors();
  const key = buildProgressKey(cardId, orientation);
  
  if (isCorrect) {
    if (e[key]) {
      e[key].cc++;
      // 如果连续答对5次，从错题中删除（已掌握）
      if (e[key].cc >= 5) {
        delete e[key];
        saveErrors(e);
        if (!noSync) {
          deleteErrorFromServer(cardId, orientation);
        }
        return;
      }
      saveErrors(e);
      if (!noSync) {
        syncErrorToServer(cardId, orientation, isCorrect, e[key].ec, e[key].cc, e[key].timeout);
      }
    }
  } else {
    if (!e[key]) e[key] = { ec: 0, cc: 0, timeout: false };
    e[key].ec++;
    e[key].cc = 0;
    e[key].timeout = !!isTimeout;
    saveErrors(e);
    if (!noSync) {
      syncErrorToServer(cardId, orientation, isCorrect, e[key].ec, e[key].cc, e[key].timeout);
    }
  }
}

// ======================== 服务端同步 ========================
async function apiCall(method, endpoint, body) {
  const token = localStorage.getItem('taroToken');
  const headers = { 'Content-Type': 'application/json' };
  if (token) headers['Authorization'] = 'Bearer ' + token;

  const opts = { method, headers };
  if (body) opts.body = JSON.stringify(body);

  try {
    const res = await fetch(endpoint, opts);
    if (res.ok) return await res.json();
    if (res.status === 401) { toast('登录已过期，请重新登录'); localStorage.removeItem('taroToken'); setTimeout(() => location.href = 'index.html', 1500); return null; }
    return null;
  } catch(e) { return null; }
}

async function syncProgressToServer(cardId, orientation, isCorrect, interval, ease_factor, due_date, progress, correct_count, error_count) {
  // 确保 due_date 是合法数字
  const safeDueDate = (typeof due_date === 'number' && !isNaN(due_date)) ? due_date : Date.now();
  await apiCall('POST', '/api/training/progress', { card_id: cardId, orientation, is_correct: isCorrect, interval, ease_factor, due_date: safeDueDate, progress, correct_count, error_count });
}

async function syncErrorToServer(cardId, orientation, isCorrect, ec, cc, timeout) {
  await apiCall('POST', '/api/training/errors', { card_id: cardId, orientation, is_correct: isCorrect, error_count: ec, continuous_correct: cc, timeout: !!timeout });
}

async function deleteErrorFromServer(cardId, orientation) {
  await apiCall('DELETE', '/api/training/errors', { card_id: cardId, orientation });
}

// ======================== 题库生成算法 ========================
function buildQuestionPool(group, orientation, mode) {
  const cardIds = group === 'all' ? getCardsInGroup('all') : getCardsInGroup(group);
  const oriList = orientation === 'both' ? ['upright', 'reversed'] : [orientation];
  
  // 构建所有可能的 cardId + orientation 组合
  const pool = [];
  cardIds.forEach(cid => {
    oriList.forEach(ori => {
      pool.push({ cardId: cid, orientation: ori });
    });
  });

  // 去重准备
  return pool;
}

// 三级优先级队列选择（到期复习题70%、陌生题20%、熟悉题10%）
// 进度100%且未到期卡牌权重0.05（极低概率）
function weightedRandomSelect(pool, mode, count) {
  if (pool.length <= count) return shuffle([...pool]);
  
  if (mode === 'random') {
    return shuffle([...pool]).slice(0, count);
  }
  
  // mode === 'weak': 三级优先级 + 极低权重处理
  const now = Date.now();
  const items = pool.map(p => {
    const sm2 = getSM2Data(p.cardId, p.orientation);
    let tier = 3;
    if (sm2.dueDate <= now) tier = 1; // 到期复习题
    else if (sm2.progress < 30) tier = 2; // 陌生题
    else if (sm2.progress >= 100) tier = 4; // 已精通且未到期
    else tier = 3; // 熟悉题
    return { ...p, sm2, tier };
  });
  
  // 按优先级分组
  const tier1 = items.filter(i => i.tier === 1);
  const tier2 = items.filter(i => i.tier === 2);
  const tier3 = items.filter(i => i.tier === 3);
  const tier4 = items.filter(i => i.tier === 4);
  
  const selected = [];
  const used = new Set();
  
  // 计算每级需要的题数
  let need1 = Math.floor(count * 0.7);
  let need2 = Math.floor(count * 0.2);
  let need3 = count - need1 - need2;
  
  // 选择一级
  const selected1 = shuffle(tier1).slice(0, need1);
  selected1.forEach(i => { used.add(`${i.cardId}_${i.orientation}`); selected.push(i); });
  
  // 选择二级
  const available2 = tier2.filter(i => !used.has(`${i.cardId}_${i.orientation}`));
  const selected2 = shuffle(available2).slice(0, need2);
  selected2.forEach(i => { used.add(`${i.cardId}_${i.orientation}`); selected.push(i); });
  
  // 选择三级
  const available3 = tier3.filter(i => !used.has(`${i.cardId}_${i.orientation}`));
  const selected3 = shuffle(available3).slice(0, need3);
  selected3.forEach(i => { used.add(`${i.cardId}_${i.orientation}`); selected.push(i); });
  
  // 如果还不够，从四级（已精通）中抽取少量（权重0.05）
  if (selected.length < count) {
    const available4 = tier4.filter(i => !used.has(`${i.cardId}_${i.orientation}`));
    // 最多抽取5%的比例，且按0.05概率加权
    const need4 = Math.min(Math.floor(count * 0.05), count - selected.length);
    const weighted4 = shuffle(available4).filter(() => Math.random() < 0.05).slice(0, need4);
    weighted4.forEach(i => { used.add(`${i.cardId}_${i.orientation}`); selected.push(i); });
  }
  
  // 如果还不够，从剩余题目中随机补
  const remaining = items.filter(i => !used.has(`${i.cardId}_${i.orientation}`));
  if (selected.length < count && remaining.length > 0) {
    selected.push(...shuffle(remaining).slice(0, count - selected.length));
  }
  
  return shuffle(selected).slice(0, count);
}

// 根据卡牌进度返回动态题型类型
function getDynamicTypeForCard(cardId) {
  const progress = getProgress();
  const upKey = buildProgressKey(cardId, 'upright');
  const revKey = buildProgressKey(cardId, 'reversed');
  const progUp = progress[upKey]?.progress || 0;
  const progRev = progress[revKey]?.progress || 0;
  const maxProg = Math.max(progUp, progRev);
  
  let types, weights;
  if (maxProg <= 30) {
    types = ['single', 'truefalse', 'fillblank'];
    weights = [60, 30, 10];
  } else if (maxProg <= 70) {
    types = ['single', 'truefalse', 'fillblank'];
    weights = [33, 22, 45];
  } else {
    types = ['fillblank', 'recall'];
    weights = [50, 50];
  }
  
  const totalWeight = weights.reduce((a, b) => a + b, 0);
  let r = Math.random() * totalWeight;
  for (let i = 0; i < types.length; i++) {
    r -= weights[i];
    if (r <= 0) return types[i];
  }
  return types[types.length - 1];
}

// 题型配比：固定对比10% + 推导10% + 画面锚点10% + 70%动态分配
function allocateQuestionTypes(count) {
  let remaining = count;
  const alloc = {};
  
  // 固定特殊题型
  alloc.compare = 10;
  alloc.deduction = 10;
  alloc.image_anchor = 10;
  remaining -= 30;
  
  // 逆位逻辑约占5%
  alloc.reversed = Math.max(3, Math.floor(remaining * 0.05));
  remaining -= alloc.reversed;
  
  // 剩余80%按动态比例分配
  alloc.single = 0;
  alloc.truefalse = 0;
  alloc.fillblank = 0;
  alloc.recall = 0;
  alloc.reverse = Math.max(2, Math.floor(remaining * 0.1));
  alloc.image = Math.max(2, Math.floor(remaining * 0.1));
  remaining -= (alloc.reverse + alloc.image);
  // 为另外4种题型分配剩余（按weighted）
  alloc.single = Math.floor(remaining * 0.25);
  alloc.truefalse = Math.floor(remaining * 0.15);
  alloc.fillblank = Math.floor(remaining * 0.3);
  alloc.recall = remaining - alloc.single - alloc.truefalse - alloc.fillblank;
  
  // 显示当前比例在首页
  const names = {
    single: '单选', truefalse: '判断', fillblank: '填空', 
    reversed: '逆位逻辑', reverse: '倒序记忆', image: '图片联想',
    compare: '对比(10%)', recall: '看牌说词', image_anchor: '画面锚点(10%)',
    deduction: '推导(10%)'
  };
  const ratioText = Object.keys(names).map(t => `${names[t]}${Math.round(alloc[t]/count*100)}%`).join(' / ');
  const el = document.getElementById('type-ratio-info');
  if (el) el.textContent = ratioText;
  
  return alloc;
}

// 生成对比题（相似牌对比）
function generateCompareQuestion(poolItem) {
  // 找到包含这张牌的相似牌对
  const pair = CONFUSE_PAIRS.find(p => p.includes(poolItem.cardId));
  if (!pair) return null;
  
  // 确定目标牌和混淆牌
  const targetIndex = pair.indexOf(poolItem.cardId);
  const targetId = pair[targetIndex];
  const confuseId = pair[1 - targetIndex];
  
  const targetCard = getCardById(targetId);
  const confuseCard = getCardById(confuseId);
  
  if (!targetCard || !confuseCard || !targetCard.uk || !confuseCard.uk) return null;
  
  const isUp = poolItem.orientation === 'upright';
  const correctAnswer = isUp ? targetCard.uk : targetCard.rk;
  const confuseAnswer = isUp ? confuseCard.uk : confuseCard.rk;
  
  // 再找两个其他干扰项
  const others = TAROT_CARDS.filter(c => c.id !== targetId && c.id !== confuseId && (isUp ? c.uk : c.rk));
  const otherOptions = shuffle([...others]).slice(0,2).map(c => isUp ? c.uk : c.rk);
  
  const options = shuffle([correctAnswer, confuseAnswer, ...otherOptions]);
  
  return {
    type: 'compare',
    question: `以下哪项是「${targetCard.name}」${isUp ? '正' : '逆'}位的核心含义？`,
    cardName: targetCard.name,
    cardId: targetId,
    orientation: poolItem.orientation,
    options,
    correctIndex: options.indexOf(correctAnswer),
    correctAnswer,
    explanation: `✅ 正确：${targetCard.name} = ${correctAnswer}<br>❌ 易混淆：${confuseCard.name} = ${confuseAnswer}`
  };
}

// 生成纯回忆题（看牌说词）
function generateRecallQuestion(poolItem) {
  const card = getCardById(poolItem.cardId);
  if (!card || !card.uk || !card.rk) return null;
  
  const isUp = poolItem.orientation === 'upright';
  const correctAnswer = isUp ? card.uk : card.rk;
  const keywords = correctAnswer.split(/[，,、；;\|\/\\\s]+/).filter(k => k.trim());
  if (keywords.length === 0) keywords.push(correctAnswer);
  
  return {
    type: 'recall',
    question: '看着卡牌，输入所有核心关键词（用逗号分隔）',
    cardName: card.name,
    cardId: card.id,
    orientation: poolItem.orientation,
    showImageOnly: true, // 只显示卡牌，不显示牌名
    correctAnswer,
    keywords,
    explanation: `${card.name}${isUp ? '正' : '逆'}位核心关键词：${correctAnswer}`
  };
}

// 生成画面锚点题
function generateImageAnchorQuestion(poolItem) {
  const card = getCardById(poolItem.cardId);
  if (!card || !card.uk || !card.rk) return null;
  
  const isUp = poolItem.orientation === 'upright';
  const anchorList = getCardAnchors(poolItem.cardId, poolItem.orientation);
  if (!anchorList || anchorList.length === 0) {
    return null;
  }
  
  // 从画面锚点列表中随机选3个（不足3个则全部选取）
  const selectedAnchors = shuffle([...anchorList]).slice(0, Math.min(3, anchorList.length));
  const anchorsText = selectedAnchors.join('、');

  const correctAnswer = isUp ? card.uk : card.rk;
  const others = TAROT_CARDS.filter(c => c.id !== card.id && (isUp ? c.uk : c.rk));
  const wrongOptions = shuffle([...others]).slice(0,3).map(c => isUp ? c.uk : c.rk);

  const options = shuffle([correctAnswer, ...wrongOptions]);

  return {
    type: 'image_anchor',
    question: `这张牌画面中「${anchorsText}」对应的核心含义是？`,
    cardName: card.name,
    cardId: card.id,
    orientation: poolItem.orientation,
    showImageOnly: true,
    selectedAnchors,
    options,
    correctIndex: options.indexOf(correctAnswer),
    correctAnswer,
    explanation: `画面锚点「${anchorsText}」→ 核心含义：${correctAnswer}`
  };
}

        `<div style="padding:10px 14px;border-radius:8px;background:rgba(212,184,122,.1);border:1px solid rgba(212,184,122,.2);color:#d4b87a;font-weight:600">` +
        `${suit.element}元素（${suit.elementName}） + ${court.name}（${court.level}级） = ${isUp ? deduction.upright : deduction.reversed}</div></div>` +
        
        `<div class="fb-section"><div class="fb-section-label">故事线</div>` +
        `<div class="fb-detail">${suit.story}</div></div>` +
        
        `<div class="fb-section"><div class="fb-section-label">核心答案</div>` +
        `<div class="fb-detail"><strong>${isUp ? '正位' : '逆位'}：${correctAnswer}</strong></div></div>`;
    } else {
      return null;
    }
  }
  
  // 干扰项生成逻辑
  const wrongCards = [];
  
  if (isMajor) {
    // 大阿卡纳干扰项：同阶段不同元素
    const sameStage = Object.entries(DEDUCTION_DATA.cardDeductions)
      .filter(([id, d]) => parseInt(id) <= 22 && d.stage === deduction.stage && parseInt(id) !== poolItem.cardId)
      .map(([id]) => parseInt(id));
    shuffle(sameStage).slice(0, 2).forEach(id => {
      const c = getCardById(id);
      if (c) {
        const ans = isUp ? c.uk : c.rk;
        if (ans && ans !== correctAnswer && !wrongCards.includes(ans)) {
          wrongCards.push(ans);
        }
      }
    });
  } else {
    // 小阿卡纳干扰项逻辑
    let suitKey = null;
    if (poolItem.cardId >= 51 && poolItem.cardId <= 64) suitKey = 'wands';
    else if (poolItem.cardId >= 65 && poolItem.cardId <= 78) suitKey = 'cups';
    else if (poolItem.cardId >= 37 && poolItem.cardId <= 50) suitKey = 'pentacles';
    else if (poolItem.cardId >= 23 && poolItem.cardId <= 36) suitKey = 'swords';
    
    if (deduction.stage) {
      const sameStageDifferentSuit = [];
      Object.keys(DEDUCTION_DATA.suitCards).forEach(sk => {
        if (sk !== suitKey) {
          const cards = DEDUCTION_DATA.suitCards[sk].filter(id => {
            const d = DEDUCTION_DATA.cardDeductions[id];
            return d && d.stage === deduction.stage;
          });
          sameStageDifferentSuit.push(...cards);
        }
      });
      shuffle(sameStageDifferentSuit).slice(0, 2).forEach(id => {
        const c = getCardById(id);
        if (c) {
          const ans = isUp ? c.uk : c.rk;
          if (ans && ans !== correctAnswer && !wrongCards.includes(ans)) {
            wrongCards.push(ans);
          }
        }
      });
      
      if (wrongCards.length < 2) {
        const sameSuitDifferentStage = DEDUCTION_DATA.suitCards[suitKey].filter(id => {
          const d = DEDUCTION_DATA.cardDeductions[id];
          return d && d.stage && d.stage !== deduction.stage;
        });
        shuffle(sameSuitDifferentStage).slice(0, 2).forEach(id => {
          const c = getCardById(id);
          if (c) {
            const ans = isUp ? c.uk : c.rk;
            if (ans && ans !== correctAnswer && !wrongCards.includes(ans)) {
              wrongCards.push(ans);
            }
          }
        });
      }
    } else if (deduction.court) {
      const sameCourtDifferentSuit = [];
      Object.keys(DEDUCTION_DATA.suitCards).forEach(sk => {
        if (sk !== suitKey) {
          const cards = DEDUCTION_DATA.suitCards[sk].filter(id => {
            const d = DEDUCTION_DATA.cardDeductions[id];
            return d && d.court === deduction.court;
          });
          sameCourtDifferentSuit.push(...cards);
        }
      });
      shuffle(sameCourtDifferentSuit).slice(0, 2).forEach(id => {
        const c = getCardById(id);
        if (c) {
          const ans = isUp ? c.uk : c.rk;
          if (ans && ans !== correctAnswer && !wrongCards.includes(ans)) {
            wrongCards.push(ans);
          }
        }
      });
      
      if (wrongCards.length < 2) {
        const sameSuitDifferentCourt = DEDUCTION_DATA.suitCards[suitKey].filter(id => {
          const d = DEDUCTION_DATA.cardDeductions[id];
          return d && d.court && d.court !== deduction.court;
        });
        shuffle(sameSuitDifferentCourt).slice(0, 2).forEach(id => {
          const c = getCardById(id);
          if (c) {
            const ans = isUp ? c.uk : c.rk;
            if (ans && ans !== correctAnswer && !wrongCards.includes(ans)) {
              wrongCards.push(ans);
            }
          }
        });
      }
    }
  }
  
  // 补充干扰项
  while (wrongCards.length < 3) {
    const others = TAROT_CARDS.filter(c => c && c.id !== poolItem.cardId && (isUp ? c.uk : c.rk));
    if (others.length > 0) {
      const randomCard = shuffle(others)[0];
      const c = randomCard;
      if (c) {
        const ans = isUp ? c.uk : c.rk;
        if (ans && ans !== correctAnswer && !wrongCards.includes(ans)) {
          wrongCards.push(ans);
        }
      }
    } else {
      break;
    }
    if (wrongCards.length >= 3) break;
  }
  
  const options = shuffle([correctAnswer, ...wrongCards.slice(0, 3)]);
  
  return {
    type: 'deduction',
    question: questionText,
    cardName: card.name,
    cardId: card.id,
    orientation: poolItem.orientation,
    isMajor,
    deduction,
    showImageOnly: true,
    options,
    correctIndex: options.indexOf(correctAnswer),
    correctAnswer,
    explanation: feedbackContent
  };
}
